<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0F0D0A">
  <title>Kitchen — Nardos</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── KITCHEN LAYOUT ── */
    .kitchen-header {
      background:var(--surface);
      border-bottom:1px solid var(--border);
      padding:.85rem 1.25rem;
      display:flex; align-items:center; gap:.75rem;
    }
    .kitchen-stats {
      display:flex; gap:.5rem; flex-wrap:wrap;
    }
    .kstat {
      display:flex; align-items:center; gap:.3rem;
      padding:.3rem .7rem;
      background:var(--surface2);
      border:1px solid var(--border);
      border-radius:100px;
      font-size:.72rem; font-weight:700; color:var(--text3);
    }
    .kstat .n { color:var(--text); font-family:'Syne',sans-serif; }

    .kitchen-body {
      display:grid;
      grid-template-columns:1fr 300px;
      gap:1rem;
      padding:1rem;
      max-width:1100px; margin:0 auto;
      min-height:calc(100dvh - var(--nav-h) - 56px);
    }
    @media(max-width:768px) {
      .kitchen-body { grid-template-columns:1fr; }
      .queue-sidebar { order:-1; }
    }

    /* ── ORDER COLUMNS ── */
    .orders-col { display:flex; flex-direction:column; gap:.75rem; }
    .orders-section-title {
      font-family:'Syne',sans-serif;
      font-size:.78rem; font-weight:700;
      text-transform:uppercase; letter-spacing:.08em;
      color:var(--text4); margin-bottom:.25rem;
    }

    /* ── ORDER CARD ── */
    .order-card-kitchen {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--r-lg);
      overflow:hidden;
      transition:border-color .2s, box-shadow .2s;
    }
    .order-card-kitchen.status-pending { border-color:rgba(245,195,0,.25); }
    .order-card-kitchen.status-preparing { border-color:rgba(232,41,28,.35); box-shadow:0 0 16px rgba(232,41,28,.08); }
    .order-card-kitchen.status-ready { border-color:rgba(34,197,94,.3); }

    .okh {
      display:flex; align-items:center; justify-content:space-between;
      padding:.7rem 1rem;
      border-bottom:1px solid var(--border);
      background:var(--surface2);
    }
    .okh-left { display:flex; align-items:center; gap:.6rem; }
    .ok-id {
      font-family:'Syne',sans-serif;
      font-weight:800; font-size:.88rem; color:var(--text);
    }
    .ok-student { font-size:.75rem; color:var(--text3); }
    .ok-delivery {
      display:inline-flex; align-items:center; gap:.25rem;
      padding:.2rem .5rem;
      border-radius:100px;
      background:var(--red-pale);
      border:1px solid rgba(232,41,28,.2);
      color:var(--red-lt);
      font-size:.62rem; font-weight:700;
    }
    .ok-time { font-size:.7rem; color:var(--text4); }

    /* Items in kitchen card */
    .ok-items { padding:.6rem 1rem; }
    .ok-item-row {
      display:flex; align-items:center; gap:.5rem;
      padding:.35rem 0;
      font-size:.85rem; color:var(--text2);
      border-bottom:1px solid var(--border);
    }
    .ok-item-row:last-child { border-bottom:none; }
    .ok-item-person {
      width:20px; height:20px;
      border-radius:50%; background:var(--yellow-pale);
      border:1px solid var(--border2);
      color:var(--yellow); font-size:.6rem; font-weight:800;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0;
    }
    .ok-item-name { flex:1; }
    .ok-item-qty { font-size:.75rem; color:var(--text4); }

    /* Kitchen card footer */
    .ok-footer {
      padding:.6rem 1rem;
      border-top:1px solid var(--border);
      display:flex; align-items:center; gap:.5rem;
      flex-wrap:wrap;
    }
    .ok-notes {
      width:100%;
      font-size:.75rem; color:var(--text3);
      padding:.3rem .5rem;
      background:var(--surface2);
      border-radius:6px;
      margin-bottom:.4rem;
    }

    /* Kitchen timer */
    .ok-timer {
      font-family:'Syne',sans-serif;
      font-size:1.2rem; font-weight:800;
      color:var(--yellow);
      font-variant-numeric:tabular-nums;
      margin-right:auto;
    }
    .ok-timer.urgent { color:var(--red-lt); animation:blink .8s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* Action buttons */
    .ok-btn {
      padding:.4rem .85rem;
      border-radius:8px;
      font-size:.78rem; font-weight:700;
      cursor:pointer; transition:all .15s;
      border:none;
    }
    .ok-btn-prepare { background:var(--red); color:#fff; }
    .ok-btn-prepare:hover { background:var(--red-lt); }
    .ok-btn-ready { background:var(--green); color:#fff; }
    .ok-btn-ready:hover { filter:brightness(1.1); }
    .ok-btn-served { background:var(--surface3); color:var(--text3); border:1px solid var(--border); }
    .ok-btn-served:hover { color:var(--text); }

    /* Timer setter */
    .timer-setter {
      display:flex; align-items:center; gap:.4rem;
    }
    .timer-input {
      width:52px;
      background:var(--surface2);
      border:1px solid var(--border);
      border-radius:6px;
      padding:.35rem .5rem;
      color:var(--text);
      font-size:.82rem; font-weight:700;
      text-align:center; outline:none;
    }
    .timer-input:focus { border-color:var(--yellow); }
    .timer-unit { font-size:.72rem; color:var(--text4); }

    /* ── QUEUE SIDEBAR ── */
    .queue-sidebar {
      position:sticky; top:calc(var(--nav-h) + 56px + 1rem);
      height:fit-content;
    }
    .queue-panel {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--r-lg);
      overflow:hidden;
    }
    .queue-panel-header {
      padding:.85rem 1rem;
      border-bottom:1px solid var(--border);
      background:var(--surface2);
      display:flex; align-items:center; justify-content:space-between;
    }
    .queue-panel-title {
      font-family:'Syne',sans-serif;
      font-weight:700; font-size:.88rem;
    }
    .queue-count-badge {
      background:var(--yellow);
      color:#0F0D0A;
      font-size:.68rem; font-weight:800;
      padding:.15rem .5rem;
      border-radius:100px;
    }
    .queue-panel-body { padding:.75rem; }
    .kitchen-queue-entry {
      display:flex; align-items:center; gap:.6rem;
      padding:.6rem .75rem;
      background:var(--surface2);
      border:1px solid var(--border);
      border-radius:var(--r);
      margin-bottom:.5rem;
      transition:border-color .15s;
    }
    .kitchen-queue-entry:last-child { margin-bottom:0; }
    .kq-pos {
      width:26px; height:26px;
      border-radius:50%;
      background:var(--yellow);
      color:#0F0D0A;
      font-size:.72rem; font-weight:800;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0;
    }
    .kq-info { flex:1; min-width:0; }
    .kq-name { font-weight:600; font-size:.85rem; color:var(--text); }
    .kq-detail { font-size:.68rem; color:var(--text3); margin-top:.1rem; }
    .kq-serve-btn {
      padding:.3rem .6rem;
      border-radius:6px;
      background:var(--surface3);
      border:1px solid var(--border);
      color:var(--text3);
      font-size:.68rem; font-weight:700;
      cursor:pointer;
      transition:all .15s;
      white-space:nowrap;
    }
    .kq-serve-btn:hover { background:var(--green); color:#fff; border-color:transparent; }

    /* New order pulse */
    @keyframes new-order-flash {
      0%,100%{background:var(--surface)}
      25%,75%{background:rgba(245,195,0,.08)}
    }
    .new-order-flash { animation:new-order-flash 1.5s ease 2; }

    /* Empty */
    .kitchen-empty {
      display:flex; flex-direction:column; align-items:center;
      padding:3rem 1.5rem; text-align:center;
      color:var(--text3);
    }
    .kitchen-empty-icon { font-size:2.5rem; margin-bottom:.75rem; opacity:.4; }
  </style>
</head>
<body>
<div class="noise-bg"></div>

<!-- NAV -->
<nav class="nav">
  <div class="nav-logo-box" id="nav-logo-box">N</div>
  <div>
    <div class="nav-name">Nardos Kitchen</div>
    <div class="nav-sub">Staff View</div>
  </div>
  <div class="nav-spacer"></div>
  <button class="nav-btn" id="tour-btn" style="margin-right:.4rem;">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    Guide
  </button>
  <a href="index.html" class="nav-btn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </a>
</nav>

<!-- KITCHEN STATS BAR -->
<div class="kitchen-header">
  <div class="kitchen-stats" id="kitchen-stats"></div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:.5rem;">
    <div id="live-dot" style="width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s ease-in-out infinite;"></div>
    <span style="font-size:.72rem;color:var(--text3);">Live</span>
  </div>
</div>

<!-- KITCHEN BODY -->
<div class="kitchen-body">

  <!-- Orders Column -->
  <div class="orders-col">
    <div>
      <div class="orders-section-title">🔴 Active Orders</div>
      <div id="active-orders"></div>
    </div>
    <div>
      <div class="orders-section-title" style="margin-top:.5rem;">✅ Ready / Completed</div>
      <div id="done-orders"></div>
    </div>
  </div>

  <!-- Queue Sidebar -->
  <div class="queue-sidebar">
    <div class="queue-panel">
      <div class="queue-panel-header">
        <div class="queue-panel-title">🚶 Virtual Line</div>
        <div class="queue-count-badge" id="queue-count">0</div>
      </div>
      <div class="queue-panel-body" id="queue-panel-body">
        <div class="kitchen-empty">
          <div class="kitchen-empty-icon">🏃</div>
          <div style="font-size:.82rem;">No one in line</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- TIMER SETTER MODAL -->
<div class="modal-overlay" id="timer-modal" style="display:none;">
  <div class="modal" style="max-width:340px;">
    <div class="sheet-handle"></div>
    <div class="modal-header">
      <div class="modal-title">Set Prep Timer</div>
      <button class="modal-close" id="timer-modal-close">✕</button>
    </div>
    <p style="font-size:.88rem;color:var(--text3);margin-bottom:1.25rem;line-height:1.6;">
      How many minutes until this order is ready? Students will see a live countdown.
    </p>
    <div class="field" style="margin-bottom:1.25rem;">
      <label class="field-label">Minutes</label>
      <input type="number" class="field-input" id="timer-mins-input" min="1" max="60" value="10" style="font-size:1.5rem;font-weight:800;text-align:center;">
    </div>
    <div style="display:flex;gap:.6rem;">
      <button class="btn btn-ghost" style="flex:1;" id="timer-cancel">Cancel</button>
      <button class="btn btn-red" style="flex:2;" id="timer-confirm">Start Timer & Begin Prep</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="demo-seed.js"></script>
<script src="app.js"></script>
<script>
'use strict';
Store.load();

const savedLogo = localStorage.getItem('nardos_logo');
if (savedLogo) document.getElementById('nav-logo-box').innerHTML = `<img src="${savedLogo}" alt="logo">`;

let timerIntervals = {};
let pendingOrderId = null;

/* ── RENDER STATS ── */
function renderStats() {
  const pending   = Store.orders.filter(o => o.status === 'pending').length;
  const preparing = Store.orders.filter(o => o.status === 'preparing').length;
  const ready     = Store.orders.filter(o => o.status === 'ready').length;
  const stats = document.getElementById('kitchen-stats');
  stats.innerHTML = `
    <div class="kstat"><span class="n">${pending}</span> Pending</div>
    <div class="kstat"><span class="n" style="color:var(--red-lt)">${preparing}</span> Preparing</div>
    <div class="kstat"><span class="n" style="color:var(--green)">${ready}</span> Ready</div>
    <div class="kstat"><span class="n">${Store.orders.length}</span> Total</div>
  `;
}

/* ── RENDER ORDERS ── */
function renderOrders() {
  const activeEl = document.getElementById('active-orders');
  const doneEl   = document.getElementById('done-orders');

  const active = Store.orders.filter(o => o.status === 'pending' || o.status === 'preparing');
  const done   = Store.orders.filter(o => o.status === 'ready' || o.status === 'served');

  // Clear old timers
  Object.values(timerIntervals).forEach(clearInterval);
  timerIntervals = {};

  if (active.length === 0) {
    activeEl.innerHTML = `<div class="kitchen-empty"><div class="kitchen-empty-icon">🎉</div><div style="font-size:.88rem;">All caught up!</div></div>`;
  } else {
    activeEl.innerHTML = '';
    active.forEach(order => {
      activeEl.appendChild(buildOrderCard(order));
    });
  }

  if (done.length === 0) {
    doneEl.innerHTML = `<div class="kitchen-empty"><div class="kitchen-empty-icon">📭</div><div style="font-size:.82rem;">No completed orders yet</div></div>`;
  } else {
    doneEl.innerHTML = '';
    done.slice(0, 8).forEach(order => {
      doneEl.appendChild(buildOrderCard(order));
    });
  }

  renderStats();
}

function buildOrderCard(order) {
  const card = document.createElement('div');
  card.className = 'order-card-kitchen status-' + order.status;
  card.id = 'order-' + order.id;

  const allItems = order.persons
    ? order.persons.flatMap(p => (p.items || []).map(i => ({ ...i, personName: p.name })))
    : order.items || [];

  const notesHtml = order.notes
    ? `<div class="ok-notes">📝 ${escapeHtml(order.notes)}</div>` : '';

  let timerHtml = '';
  if (order.timerEnd && order.status === 'preparing') {
    timerHtml = `<div class="ok-timer" id="ktimer-${order.id}">--:--</div>`;
  }

  let footerBtns = '';
  if (order.status === 'pending') {
    footerBtns = `
      <button class="ok-btn ok-btn-prepare" data-id="${order.id}" data-action="prepare">
        🔥 Start Preparing
      </button>
    `;
  } else if (order.status === 'preparing') {
    footerBtns = `
      <button class="ok-btn ok-btn-ready" data-id="${order.id}" data-action="ready">
        ✅ Mark Ready
      </button>
    `;
  } else if (order.status === 'ready') {
    footerBtns = `
      <button class="ok-btn ok-btn-served" data-id="${order.id}" data-action="served">
        Served
      </button>
    `;
  }

  card.innerHTML = `
    <div class="okh">
      <div class="okh-left">
        <div class="ok-id">${order.id}</div>
        ${order.wantsDelivery
          ? `<div class="ok-delivery"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>Deliver: ${escapeHtml(order.hall || '')}</div>`
          : `<div class="ok-student">${escapeHtml(order.student || '')} · Pickup</div>`
        }
      </div>
      <div class="ok-time">${timeAgo(order.createdAt)}</div>
    </div>
    <div class="ok-items">
      ${allItems.map(item => `
        <div class="ok-item-row">
          <div class="ok-item-person">${(item.personName || 'Me').charAt(0).toUpperCase()}</div>
          <div class="ok-item-name">${escapeHtml(item.name || item.id)}</div>
          <div class="ok-item-qty">×${item.qty || item.quantity || 1}</div>
        </div>
      `).join('')}
    </div>
    <div class="ok-footer">
      ${notesHtml}
      ${timerHtml}
      ${footerBtns}
    </div>
  `;

  // Action buttons
  card.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const action = btn.dataset.action;
      if (action === 'prepare') {
        pendingOrderId = id;
        document.getElementById('timer-modal').style.display = 'flex';
      } else if (action === 'ready') {
        Store.updateOrderStatus(id, 'ready');
        showToast('Order ' + id + ' marked ready!', 'success');
        renderOrders(); renderQueue();
      } else if (action === 'served') {
        Store.updateOrderStatus(id, 'served');
        // Also mark in queue
        const order = Store.orders.find(o => o.id === id);
        if (order) {
          const qe = Store.queue.find(q => q.name === order.student && !q.served);
          if (qe) Store.markServed(qe.id);
        }
        showToast('Order ' + id + ' served!', 'success');
        renderOrders(); renderQueue();
      }
    });
  });

  // Start kitchen timer if active
  if (order.timerEnd && order.status === 'preparing') {
    const el = card.querySelector('#ktimer-' + order.id);
    function tick() {
      const rem = new Date(order.timerEnd) - Date.now();
      if (!el) return;
      if (rem <= 0) {
        el.textContent = 'DONE';
        el.classList.add('urgent');
        clearInterval(timerIntervals[order.id]);
        return;
      }
      const mins = Math.floor(rem / 60000);
      const secs = Math.floor((rem % 60000) / 1000);
      el.textContent = mins + ':' + String(secs).padStart(2,'0');
      el.classList.toggle('urgent', rem < 60000);
    }
    tick();
    timerIntervals[order.id] = setInterval(tick, 1000);
  }

  return card;
}

/* ── TIMER MODAL ── */
document.getElementById('timer-confirm').addEventListener('click', () => {
  const mins = parseInt(document.getElementById('timer-mins-input').value) || 10;
  if (!pendingOrderId) return;
  Store.updateOrderStatus(pendingOrderId, 'preparing', mins);
  showToast('Timer set for ' + mins + ' minutes', 'success');
  document.getElementById('timer-modal').style.display = 'none';
  pendingOrderId = null;
  renderOrders();
});
document.getElementById('timer-cancel').addEventListener('click', () => {
  document.getElementById('timer-modal').style.display = 'none';
  pendingOrderId = null;
});
document.getElementById('timer-modal-close').addEventListener('click', () => {
  document.getElementById('timer-modal').style.display = 'none';
  pendingOrderId = null;
});

/* ── QUEUE ── */
function renderQueue() {
  const body = document.getElementById('queue-panel-body');
  const countBadge = document.getElementById('queue-count');
  const queue = Store.getActiveQueue();
  countBadge.textContent = queue.length;

  if (queue.length === 0) {
    body.innerHTML = `<div class="kitchen-empty"><div class="kitchen-empty-icon">🏃</div><div style="font-size:.82rem;">No one in line</div></div>`;
    return;
  }

  body.innerHTML = '';
  queue.forEach((entry, i) => {
    const el = document.createElement('div');
    el.className = 'kitchen-queue-entry';
    const rem = new Date(entry.estimatedReady) - Date.now();
    const remMins = Math.max(0, Math.ceil(rem / 60000));
    el.innerHTML = `
      <div class="kq-pos">${i+1}</div>
      <div class="kq-info">
        <div class="kq-name">${escapeHtml(entry.name)}</div>
        <div class="kq-detail">${entry.hall || 'Pickup'} · ${remMins > 0 ? '~' + remMins + 'min' : 'Ready now!'}</div>
      </div>
      <button class="kq-serve-btn" data-qid="${entry.id}">Served</button>
    `;
    el.querySelector('.kq-serve-btn').addEventListener('click', () => {
      Store.markServed(entry.id);
      showToast(entry.name + ' served!', 'success');
      renderQueue();
    });
    body.appendChild(el);
  });
}

/* ── REAL-TIME ── */
try {
  const bc = new BroadcastChannel('nardos_orders');
  bc.addEventListener('message', e => {
    Store.load();
    if (e.data.type === 'new_order') {
      renderOrders();
      renderQueue();
      showToast('New order: ' + e.data.payload.id, 'info');
      // Flash
      setTimeout(() => {
        const card = document.getElementById('order-' + e.data.payload.id);
        if (card) card.classList.add('new-order-flash');
      }, 100);
    }
    if (e.data.type === 'queue_update') {
      Store.queue = e.data.payload;
      renderQueue();
    }
  });
} catch(err) {}

// Auto refresh
setInterval(() => { Store.load(); renderOrders(); renderQueue(); }, 5000);

/* ── INIT ── */
renderOrders();
renderQueue();
Tour.init('kitchen');
</script>
</body>
