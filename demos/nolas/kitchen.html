<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0C0A07">
  <title>Nola's Events — Kitchen Display</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Jost:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0C0A07; --bg2:#0F0D09; --surface:#1A1610; --surface2:#221D14;
      --border:rgba(212,168,67,.14); --border2:rgba(212,168,67,.28);
      --gold:#D4A843; --gold-pale:rgba(212,168,67,.08);
      --cream:#F5ECD7; --text:#F5ECD7; --text2:#C9B89A; --text3:#9B8878; --text4:#6B5848;
      --jerk:#E05A2B; --green:#4CAF7A; --amber:#F59E0B; --blue:#5B9BD5;
      --col-pending:#E05A2B; --col-preparing:#5B9BD5; --col-ready:#4CAF7A;
      --r:10px; --r-lg:16px; --r-xl:22px;
      --nav-h:60px; --stats-h:52px;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Jost',sans-serif; background:var(--bg); color:var(--text);
      height:100dvh; display:flex; flex-direction:column; overflow:hidden;
    }
    button { font-family:'Jost',sans-serif; cursor:pointer; }

    /* ── NAV ── */
    .k-nav {
      height:var(--nav-h); display:flex; align-items:center; padding:0 1.5rem;
      background:var(--bg2); border-bottom:1px solid var(--border);
      flex-shrink:0; gap:1rem;
    }
    .k-brand { display:flex; align-items:center; gap:.6rem; }
    .k-logo  { width:30px;height:30px;background:var(--jerk);border-radius:7px;display:grid;place-items:center;font-size:.9rem; }
    .k-brand-text { font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700;color:var(--cream); }
    .k-brand-tag  { font-size:.58rem;color:var(--text4);letter-spacing:.1em;text-transform:uppercase; }
    .k-spacer { flex:1; }
    .k-station-select {
      padding:.4rem .8rem; border-radius:8px;
      background:var(--surface2); border:1px solid var(--border);
      color:var(--text2); font-size:.78rem; font-weight:500;
      font-family:'Jost',sans-serif; cursor:pointer;
    }
    .k-station-select:focus { outline:none;border-color:var(--border2); }
    .k-nav-link {
      padding:.38rem .8rem; border-radius:7px;
      color:var(--text3); font-size:.78rem; font-weight:500;
      text-decoration:none; transition:all .18s;
      border:1px solid transparent;
    }
    .k-nav-link:hover { background:rgba(255,255,255,.05);color:var(--text); }
    .k-tour-btn {
      display:flex;align-items:center;gap:.35rem;
      padding:.38rem .8rem; border-radius:7px;
      border:1px solid var(--border2); background:var(--gold-pale);
      color:var(--gold); font-size:.72rem; font-weight:600;
    }
    .k-tour-btn:hover { background:rgba(212,168,67,.15); }
    .live-dot {
      width:7px;height:7px;border-radius:50%;background:var(--green);
      animation:pulse-live 2s ease-in-out infinite; flex-shrink:0;
    }
    @keyframes pulse-live { 0%,100%{opacity:1}50%{opacity:.3} }
    .k-live-label { font-size:.72rem;color:var(--green);font-weight:600; }

    /* ── STATS BAR ── */
    .k-stats-bar {
      height:var(--stats-h); display:flex; align-items:center; padding:0 1.5rem; gap:1.25rem;
      background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0;
    }
    .k-stat {
      display:flex; align-items:center; gap:.5rem;
    }
    .k-stat-label { font-size:.68rem; color:var(--text4); text-transform:uppercase; letter-spacing:.1em; font-weight:600; }
    .k-stat-val {
      font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:700; line-height:1;
    }
    .k-stat-divider { width:1px; height:24px; background:var(--border); }
    .k-critical {
      display:flex; align-items:center; gap:.4rem;
      padding:.25rem .75rem; border-radius:100px;
      background:rgba(224,90,43,.12); border:1px solid rgba(224,90,43,.25);
      color:var(--jerk); font-size:.72rem; font-weight:700;
      margin-left:auto;
    }
    .k-critical.hidden { display:none; }

    /* ── KITCHEN GRID ── */
    .k-grid {
      flex:1; display:grid; grid-template-columns:repeat(3,1fr);
      gap:0; overflow:hidden;
    }
    .k-col {
      display:flex; flex-direction:column;
      border-right:1px solid var(--border);
      overflow:hidden;
    }
    .k-col:last-child { border-right:none; }

    .k-col-hdr {
      padding:.875rem 1.25rem;
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
      flex-shrink:0;
    }
    .k-col-hdr-left { display:flex;align-items:center;gap:.6rem; }
    .k-col-indicator { width:10px;height:10px;border-radius:50%; }
    .k-col-title { font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--cream); }
    .k-col-count {
      background:var(--surface2); color:var(--text3);
      border-radius:100px; padding:.15rem .6rem;
      font-size:.7rem; font-weight:700;
    }

    .k-col-body {
      flex:1; overflow-y:auto; padding:.875rem;
      display:flex; flex-direction:column; gap:.75rem;
    }
    .k-col-body::-webkit-scrollbar { width:4px; }
    .k-col-body::-webkit-scrollbar-thumb { background:var(--border2);border-radius:2px; }

    /* ── ORDER CARD ── */
    .order-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--r-lg); overflow:hidden;
      transition:border-color .2s, box-shadow .2s;
    }
    .order-card.urgent  { border-color:rgba(245,158,11,.4); box-shadow:0 0 0 1px rgba(245,158,11,.15); }
    .order-card.critical{ border-color:rgba(224,90,43,.5); box-shadow:0 0 0 1px rgba(224,90,43,.2),0 0 20px rgba(224,90,43,.08); }

    .oc-top {
      padding:.75rem 1rem; display:flex; align-items:flex-start; justify-content:space-between;
      border-bottom:1px solid var(--border);
    }
    .oc-table {
      font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--cream);
    }
    .oc-table-sub { font-size:.68rem;color:var(--text4);margin-top:1px; }
    .oc-timer {
      font-size:.78rem;font-weight:700;padding:.2rem .55rem;border-radius:6px;
    }
    .oc-timer.ok       { background:rgba(76,175,122,.12);color:var(--green); }
    .oc-timer.warn     { background:rgba(245,158,11,.12);color:var(--amber); }
    .oc-timer.critical { background:rgba(224,90,43,.15);color:var(--jerk); animation:blink .8s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.4} }

    .oc-persons { padding:.75rem 1rem; }
    .oc-person-name {
      font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;
      color:var(--text4);margin-bottom:.3rem;margin-top:.5rem;
    }
    .oc-person-name:first-child { margin-top:0; }
    .oc-item {
      display:flex; align-items:flex-start; gap:.5rem;
      padding:.35rem 0; border-bottom:1px solid rgba(255,255,255,.04);
    }
    .oc-item:last-child { border-bottom:none; }
    .oc-qty {
      min-width:22px; height:22px; border-radius:5px;
      background:var(--surface2); display:grid; place-items:center;
      font-size:.72rem; font-weight:700; color:var(--gold); flex-shrink:0;
    }
    .oc-item-name { font-size:.82rem;color:var(--text2);line-height:1.3; }
    .oc-notes {
      margin:.5rem 1rem 0; padding:.5rem .75rem;
      background:rgba(245,158,11,.07); border:1px solid rgba(245,158,11,.15);
      border-radius:8px; font-size:.72rem; color:var(--amber); line-height:1.5;
    }

    .oc-action {
      padding:.75rem 1rem; border-top:1px solid var(--border);
      display:flex; gap:.5rem;
    }
    .oc-btn {
      flex:1;padding:.65rem;border-radius:9px;border:none;
      font-size:.8rem;font-weight:700;
      display:flex;align-items:center;justify-content:center;gap:.4rem;
      transition:all .2s;
    }
    .oc-btn-primary { background:var(--gold);color:#0C0A07; }
    .oc-btn-primary:hover { background:#E8C56A;transform:translateY(-1px); }
    .oc-btn-secondary { background:var(--surface2);color:var(--text3);border:1px solid var(--border); }
    .oc-btn-secondary:hover { border-color:var(--border2);color:var(--text2); }

    /* Column colour accents */
    .k-col[data-status="pending"]   .k-col-indicator { background:var(--col-pending); }
    .k-col[data-status="preparing"] .k-col-indicator { background:var(--col-preparing); }
    .k-col[data-status="ready"]     .k-col-indicator { background:var(--col-ready); }
    .k-col[data-status="pending"]   .k-col-hdr { border-bottom-color:rgba(224,90,43,.2); }
    .k-col[data-status="preparing"] .k-col-hdr { border-bottom-color:rgba(91,155,213,.2); }
    .k-col[data-status="ready"]     .k-col-hdr { border-bottom-color:rgba(76,175,122,.2); }

    /* Empty state */
    .k-empty {
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:.75rem;color:var(--text4);text-align:center;padding:2rem;
    }
    .k-empty-icon { font-size:2rem; }
    .k-empty p { font-size:.82rem;line-height:1.6;max-width:180px; }

    /* ── MOBILE: single column scroll ── */
    @media(max-width:900px) {
      body { overflow:auto; }
      .k-grid { grid-template-columns:1fr; overflow:visible; height:auto; }
      .k-col  { border-right:none; border-bottom:1px solid var(--border); overflow:visible; }
      .k-col-body { overflow:visible; max-height:none; }
    }
    @media(max-width:640px) {
      .k-nav { padding:0 1rem; gap:.5rem; }
      .k-stats-bar { padding:0 1rem; gap:.75rem; overflow-x:auto; }
      .k-col-body { padding:.625rem; }
    }
  </style>
</head>
<body>

<!-- ── NAV ── -->
<nav class="k-nav">
  <div class="k-brand">
    <div class="k-logo">🔥</div>
    <div>
      <div class="k-brand-text">Kitchen Display</div>
      <div class="k-brand-tag">Nola's Events</div>
    </div>
  </div>
  <div class="k-spacer"></div>
  <div class="live-dot"></div>
  <span class="k-live-label">Live</span>
  <select class="k-station-select" id="station-filter">
    <option value="all">All Stations</option>
    <option value="jerk">🌶️ Jerk</option>
    <option value="grill">🔥 Grill</option>
    <option value="fryer">🍟 Fryer</option>
    <option value="salad">🥗 Salad</option>
    <option value="bar">🍸 Bar</option>
    <option value="oven">🔥 Oven</option>
    <option value="ice cream">🍦 Ice Cream</option>
    <option value="prep">🔪 Prep</option>
  </select>
  <button class="k-tour-btn" onclick="Tour.restart('kitchen')">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
    Tour
  </button>
  <a href="admin.html" class="k-nav-link">Admin</a>
  <a href="index.html" class="k-nav-link">Home</a>
</nav>

<!-- ── STATS BAR ── -->
<div class="k-stats-bar">
  <div class="k-stat">
    <div style="display:flex;flex-direction:column;gap:2px">
      <span class="k-stat-label">Pending</span>
      <span class="k-stat-val" id="stat-pending" style="color:var(--col-pending)">0</span>
    </div>
  </div>
  <div class="k-stat-divider"></div>
  <div class="k-stat">
    <div style="display:flex;flex-direction:column;gap:2px">
      <span class="k-stat-label">Preparing</span>
      <span class="k-stat-val" id="stat-preparing" style="color:var(--col-preparing)">0</span>
    </div>
  </div>
  <div class="k-stat-divider"></div>
  <div class="k-stat">
    <div style="display:flex;flex-direction:column;gap:2px">
      <span class="k-stat-label">Ready</span>
      <span class="k-stat-val" id="stat-ready" style="color:var(--col-ready)">0</span>
    </div>
  </div>
  <div class="k-stat-divider"></div>
  <div class="k-stat">
    <div style="display:flex;flex-direction:column;gap:2px">
      <span class="k-stat-label">Completed</span>
      <span class="k-stat-val" id="stat-completed" style="color:var(--text4)">0</span>
    </div>
  </div>
  <div class="k-critical hidden" id="critical-badge">
    ⚠ <span id="critical-count">0</span> Critical
  </div>
</div>

<!-- ── KITCHEN GRID ── -->
<main class="k-grid">
  <div class="k-col" data-status="pending">
    <div class="k-col-hdr">
      <div class="k-col-hdr-left">
        <div class="k-col-indicator"></div>
        <span class="k-col-title">Pending</span>
      </div>
      <span class="k-col-count" id="col-count-pending">0</span>
    </div>
    <div class="k-col-body" id="col-pending"></div>
  </div>

  <div class="k-col" data-status="preparing">
    <div class="k-col-hdr">
      <div class="k-col-hdr-left">
        <div class="k-col-indicator"></div>
        <span class="k-col-title">Preparing</span>
      </div>
      <span class="k-col-count" id="col-count-preparing">0</span>
    </div>
    <div class="k-col-body" id="col-preparing"></div>
  </div>

  <div class="k-col" data-status="ready">
    <div class="k-col-hdr">
      <div class="k-col-hdr-left">
        <div class="k-col-indicator"></div>
        <span class="k-col-title">Ready</span>
      </div>
      <span class="k-col-count" id="col-count-ready">0</span>
    </div>
    <div class="k-col-body" id="col-ready"></div>
  </div>
</main>

<div id="toast-container"></div>

<script src="app.js"></script>
<script src="tour.js"></script>
<script>
'use strict';
Store.load();

let stationFilter = 'all';

/* ── Advance status ── */
const NEXT_STATUS = { pending:'preparing', preparing:'ready', ready:'completed' };
const ACTION_LABEL = { pending:'Start Preparing', preparing:'Mark Ready', ready:'Complete & Serve' };
const ACTION_TOAST = { pending:'Now preparing', preparing:'Ready for service', ready:'Order completed' };

function advanceOrder(id) {
  const order = Store.orders.find(o => o.id === id);
  if (!order || !NEXT_STATUS[order.status]) return;
  const next = NEXT_STATUS[order.status];
  Store.updateOrderStatus(id, next);
  showToast(`${id} — ${ACTION_TOAST[order.status]} ✓`, 'success');
  renderKitchen();
}

/* ── Filter items by station ── */
function filterItems(persons) {
  if (stationFilter === 'all') return persons;
  return persons.map(p => ({
    ...p,
    items: p.items.filter(it => (it.station || 'prep').toLowerCase() === stationFilter)
  })).filter(p => p.items.length > 0);
}

/* ── Build order card ── */
function buildOrderCard(order) {
  const mins     = elapsedMins(order.createdAt);
  const urgent   = mins >= 12 && mins < 20;
  const critical = mins >= 20;
  const urgency  = critical ? 'critical' : urgent ? 'warn' : 'ok';

  const persons = filterItems(order.persons);
  if (!persons.length && stationFilter !== 'all') return '';

  const items = persons.map(p => {
    const pItems = p.items.map(it =>
      `<div class="oc-item">
        <div class="oc-qty">${it.quantity}</div>
        <div class="oc-item-name">${escapeHtml(it.name)}</div>
      </div>`
    ).join('');
    const persHead = order.persons.length > 1
      ? `<div class="oc-person-name">${escapeHtml(p.name)}</div>` : '';
    return persHead + pItems;
  }).join('');

  const notes = order.notes
    ? `<div class="oc-notes">⚠ ${escapeHtml(order.notes)}</div>` : '';

  const actionBtn = NEXT_STATUS[order.status] ? `
    <div class="oc-action">
      <button class="oc-btn oc-btn-secondary" onclick="Store.updateOrderStatus('${order.id}', 'completed');renderKitchen();showToast('Order voided','default')">
        Void
      </button>
      <button class="oc-btn oc-btn-primary" onclick="advanceOrder('${order.id}')">
        ${ACTION_LABEL[order.status]} →
      </button>
    </div>` : '';

  return `
    <div class="order-card${critical?' critical':urgent?' urgent':''}" id="card-${order.id}">
      <div class="oc-top">
        <div>
          <div class="oc-table">${order.orderType==='takeout'?'🛍 Takeout':'Table ' + escapeHtml(order.tableNumber)}</div>
          <div class="oc-table-sub">${order.id} · ${timeSince(order.createdAt)}</div>
        </div>
        <span class="oc-timer ${urgency}">${mins}m</span>
      </div>
      <div class="oc-persons">${items}</div>
      ${notes}
      ${actionBtn}
    </div>`;
}

/* ── Render kitchen ── */
function renderKitchen() {
  const orders   = Store.orders;
  const pending   = orders.filter(o => o.status === 'pending');
  const preparing = orders.filter(o => o.status === 'preparing');
  const ready     = orders.filter(o => o.status === 'ready');
  const completed = orders.filter(o => o.status === 'completed');
  const critical  = [...pending, ...preparing].filter(o => elapsedMins(o.createdAt) >= 20);

  // Stats
  document.getElementById('stat-pending').textContent   = pending.length;
  document.getElementById('stat-preparing').textContent = preparing.length;
  document.getElementById('stat-ready').textContent     = ready.length;
  document.getElementById('stat-completed').textContent = completed.length;
  document.getElementById('col-count-pending').textContent   = pending.length;
  document.getElementById('col-count-preparing').textContent = preparing.length;
  document.getElementById('col-count-ready').textContent     = ready.length;

  const critBadge = document.getElementById('critical-badge');
  if (critical.length > 0) {
    critBadge.classList.remove('hidden');
    document.getElementById('critical-count').textContent = critical.length;
  } else { critBadge.classList.add('hidden'); }

  const renderCol = (colId, list, emptyMsg, emptyIcon) => {
    const el = document.getElementById(colId);
    if (!list.length) {
      el.innerHTML = `<div class="k-empty"><div class="k-empty-icon">${emptyIcon}</div><p>${emptyMsg}</p></div>`;
      return;
    }
    el.innerHTML = list.map(o => buildOrderCard(o)).join('');
  };

  renderCol('col-pending',   pending,   'No pending orders', '✓');
  renderCol('col-preparing', preparing, 'Nothing in progress', '🍽️');
  renderCol('col-ready',     ready,     'No orders ready', '🔔');
}

/* ── Station filter ── */
document.getElementById('station-filter').addEventListener('change', e => {
  stationFilter = e.target.value;
  renderKitchen();
});

/* ── Auto-refresh every 5 seconds ── */
renderKitchen();
setInterval(renderKitchen, 5000);

Tour.init('kitchen');
</script>
</body>
</html>
