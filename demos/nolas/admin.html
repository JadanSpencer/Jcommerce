<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0C0A07">
  <title>Nola's Events — Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Jost:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0C0A07; --bg2:#0F0D09; --surface:#1A1610; --surface2:#221D14;
      --border:rgba(212,168,67,.14); --border2:rgba(212,168,67,.28);
      --gold:#D4A843; --gold-lt:#E8C56A; --gold-pale:rgba(212,168,67,.08);
      --cream:#F5ECD7; --text:#F5ECD7; --text2:#C9B89A; --text3:#9B8878; --text4:#6B5848;
      --jerk:#E05A2B; --green:#4CAF7A; --green-lt:rgba(76,175,122,.12); --amber:#F59E0B; --blue:#5B9BD5;
      --r:10px; --r-lg:16px; --r-xl:22px;
      --nav-h:60px; --a-nav-w:220px;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      font-family:'Jost',sans-serif; background:var(--bg); color:var(--text);
      min-height:100dvh; display:flex; flex-direction:column; overflow-x:hidden;
    }
    a { color:inherit; text-decoration:none; } button { font-family:'Jost',sans-serif; cursor:pointer; }

    /* ── TOP NAV ── */
    .a-topnav {
      height:var(--nav-h); display:flex; align-items:center; padding:0 1.5rem; gap:1rem;
      background:var(--bg2); border-bottom:1px solid var(--border);
      position:sticky; top:0; z-index:100; flex-shrink:0;
    }
    .a-brand { display:flex;align-items:center;gap:.6rem; }
    .a-logo  { width:30px;height:30px;background:var(--gold);border-radius:7px;display:grid;place-items:center;font-size:.9rem;color:#0C0A07; }
    .a-brand-text { font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700;color:var(--cream); }
    .a-brand-tag  { font-size:.58rem;color:var(--text4);letter-spacing:.1em;text-transform:uppercase; }
    .a-spacer { flex:1; }
    .a-nav-link {
      padding:.38rem .8rem;border-radius:7px;color:var(--text3);font-size:.78rem;font-weight:500;
      transition:all .18s; border:1px solid transparent;
    }
    .a-nav-link:hover { background:rgba(255,255,255,.05);color:var(--text); }
    .a-tour-btn {
      display:flex;align-items:center;gap:.35rem;
      padding:.38rem .8rem;border-radius:7px;
      border:1px solid var(--border2);background:var(--gold-pale);
      color:var(--gold);font-size:.72rem;font-weight:600;
    }
    .a-tour-btn:hover { background:rgba(212,168,67,.15); }
    #reset-demo-btn {
      display:flex;align-items:center;gap:.35rem;
      padding:.38rem .85rem;border-radius:7px;
      border:1px solid rgba(224,90,43,.3);background:rgba(224,90,43,.07);
      color:var(--jerk);font-size:.72rem;font-weight:600;
      transition:all .18s;
    }
    #reset-demo-btn:hover { background:rgba(224,90,43,.14);border-color:rgba(224,90,43,.5); }

    /* ── LAYOUT ── */
    .a-layout { display:flex;flex:1;min-height:calc(100dvh - var(--nav-h)); }

    /* ── SIDEBAR NAV ── */
    .a-nav {
      width:var(--a-nav-w); flex-shrink:0;
      background:var(--surface); border-right:1px solid var(--border);
      padding:1.25rem .875rem; display:flex; flex-direction:column; gap:.25rem;
      position:sticky; top:var(--nav-h); height:calc(100dvh - var(--nav-h));
      overflow-y:auto;
    }
    .a-nav-section-label {
      font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.18em;
      color:var(--text4);padding:.5rem .75rem .25rem;margin-top:.5rem;
    }
    .a-nav-item {
      display:flex;align-items:center;gap:.6rem;
      padding:.55rem .875rem;border-radius:var(--r);
      color:var(--text3);font-size:.82rem;font-weight:500;
      cursor:pointer;transition:all .18s;border:none;background:transparent;
      text-align:left;
    }
    .a-nav-item:hover { background:rgba(255,255,255,.05);color:var(--text2); }
    .a-nav-item.active { background:var(--gold-pale);color:var(--gold); }
    .a-nav-item-icon { font-size:1rem; }

    /* ── MAIN CONTENT ── */
    .a-main { flex:1; padding:1.75rem 2rem; overflow-y:auto; min-width:0; }

    /* ── STATS GRID ── */
    .a-stats-grid {
      display:grid; grid-template-columns:repeat(4,1fr);
      gap:1rem; margin-bottom:1.75rem;
    }
    .stat-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--r-lg); padding:1.25rem 1.25rem 1rem;
      position:relative; overflow:hidden;
    }
    .stat-card::after {
      content:''; position:absolute; top:0;left:0;right:0;height:2px;
    }
    .stat-card-revenue::after { background:linear-gradient(90deg,transparent,var(--gold),transparent); }
    .stat-card-orders::after  { background:linear-gradient(90deg,transparent,var(--blue),transparent); }
    .stat-card-pending::after { background:linear-gradient(90deg,transparent,var(--amber),transparent); }
    .stat-card-avg::after     { background:linear-gradient(90deg,transparent,var(--green),transparent); }
    .stat-icon {
      width:36px;height:36px;border-radius:9px;display:grid;place-items:center;
      font-size:1rem;margin-bottom:.875rem;
    }
    .stat-label { font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--text4);margin-bottom:.35rem; }
    .stat-value {
      font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:800;
      color:var(--cream);line-height:1;
    }
    .stat-sub   { font-size:.72rem;color:var(--text4);margin-top:.3rem; }

    /* ── SECTION HEADER ── */
    .section-hdr {
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:1.25rem;
    }
    .section-title {
      font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;color:var(--cream);
    }

    /* ── FILTER TABS ── */
    .filter-tabs { display:flex;gap:.25rem; }
    .filter-tab {
      padding:.35rem .875rem;border-radius:100px;
      border:1px solid var(--border);background:transparent;
      color:var(--text4);font-size:.75rem;font-weight:600;
      cursor:pointer;transition:all .18s;
    }
    .filter-tab.active { border-color:var(--gold);color:var(--gold);background:var(--gold-pale); }
    .filter-tab:hover:not(.active) { border-color:var(--border2);color:var(--text3); }

    /* ── ORDERS TABLE ── */
    .orders-table { display:flex;flex-direction:column;gap:.625rem; }
    .order-row {
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--r-lg); overflow:hidden;
      transition:border-color .2s;
    }
    .order-row:hover { border-color:var(--border2); }
    .order-row-top {
      padding:.875rem 1.25rem; display:flex;align-items:center;gap:1rem;
      cursor:pointer;
    }
    .or-id    { font-size:.72rem;color:var(--text4);font-family:'Courier New',monospace;flex-shrink:0; }
    .or-table { font-weight:700;color:var(--cream);font-size:.9rem;flex-shrink:0; }
    .or-info  { flex:1;min-width:0; }
    .or-items { font-size:.78rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .or-time  { font-size:.72rem;color:var(--text4);flex-shrink:0; }
    .or-total { font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--gold);flex-shrink:0; }
    .or-badge {
      padding:.2rem .65rem;border-radius:100px;font-size:.65rem;font-weight:700;
      border:1px solid;flex-shrink:0;
    }
    .badge-amber   { background:rgba(245,158,11,.1);color:var(--amber);border-color:rgba(245,158,11,.25); }
    .badge-blue    { background:rgba(91,155,213,.1);color:var(--blue);border-color:rgba(91,155,213,.25); }
    .badge-green   { background:var(--green-lt);color:var(--green);border-color:rgba(76,175,122,.25); }
    .badge-muted   { background:rgba(107,88,72,.1);color:var(--text4);border-color:rgba(107,88,72,.2); }

    .order-row-expand {
      display:none; padding:0 1.25rem 1.25rem;
      border-top:1px solid var(--border);
    }
    .order-row-expand.open { display:block; }
    .expand-persons { margin-bottom:1rem; }
    .exp-person-name { font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--text4);margin-bottom:.4rem;margin-top:.75rem; }
    .exp-person-name:first-child { margin-top:.75rem; }
    .exp-item {
      display:flex;justify-content:space-between;align-items:center;
      padding:.3rem 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.82rem;
    }
    .exp-item:last-child { border-bottom:none; }
    .exp-item-name { color:var(--text2); }
    .exp-item-qty  { color:var(--text4);font-size:.75rem;margin-left:.5rem; }
    .exp-item-price{ color:var(--gold);font-weight:600; }
    .exp-notes {
      padding:.5rem .75rem;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);
      border-radius:8px;font-size:.75rem;color:var(--amber);margin-bottom:.875rem;
    }
    .exp-totals { display:flex;flex-direction:column;gap:.2rem;align-items:flex-end; }
    .exp-row { display:flex;gap:1.5rem;font-size:.78rem;color:var(--text3); }
    .exp-row span:last-child { font-weight:600;color:var(--text2); }
    .exp-total-row { display:flex;gap:1.5rem;font-size:.88rem;font-weight:700;color:var(--cream);padding-top:.4rem;border-top:1px solid var(--border);margin-top:.2rem; }
    .exp-total-row span:last-child { color:var(--gold); }
    .exp-actions { display:flex;gap:.5rem;margin-top:.875rem;flex-wrap:wrap; }
    .btn-status {
      padding:.45rem .95rem;border-radius:8px;border:none;
      font-size:.75rem;font-weight:700;transition:all .18s;
    }
    .btn-status-primary { background:var(--gold);color:#0C0A07; }
    .btn-status-primary:hover { background:var(--gold-lt); }
    .btn-status-ghost { background:var(--surface2);color:var(--text3);border:1px solid var(--border); }
    .btn-status-ghost:hover { border-color:var(--border2);color:var(--text2); }

    /* ── MENU MANAGER ── */
    .menu-mgr-toolbar {
      display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap;
    }
    .menu-cat-filter { display:flex;gap:.25rem;flex-wrap:wrap; }
    .btn-add-item {
      display:flex;align-items:center;gap:.4rem;
      padding:.5rem 1rem;border-radius:8px;
      background:var(--gold);color:#0C0A07;font-size:.82rem;font-weight:700;
      border:none;margin-left:auto;transition:all .18s;
    }
    .btn-add-item:hover { background:var(--gold-lt); }

    .menu-items-list { display:flex;flex-direction:column;gap:.5rem; }
    .menu-item-row {
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--r-lg);padding:.875rem 1.25rem;
      display:flex;align-items:center;gap:1rem;
      transition:border-color .2s;
    }
    .menu-item-row:hover { border-color:var(--border2); }
    .menu-item-row.unavailable { opacity:.5; }
    .mi-emoji { font-size:1.4rem;flex-shrink:0; }
    .mi-info  { flex:1;min-width:0; }
    .mi-name  { font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700;color:var(--cream); }
    .mi-cat   { font-size:.68rem;color:var(--text4);text-transform:capitalize; }
    .mi-price { font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--gold);flex-shrink:0; }
    .mi-avail-toggle {
      position:relative; width:40px;height:22px;cursor:pointer;flex-shrink:0;
    }
    .mi-avail-toggle input { opacity:0;width:0;height:0; }
    .mi-toggle-track {
      position:absolute;inset:0;border-radius:11px;
      background:var(--surface2);border:1px solid var(--border);
      transition:all .25s;cursor:pointer;
    }
    .mi-toggle-track::after {
      content:'';position:absolute;width:16px;height:16px;border-radius:50%;
      background:var(--text4);top:2px;left:2px;transition:all .25s;
    }
    .mi-avail-toggle input:checked + .mi-toggle-track { background:var(--green);border-color:var(--green); }
    .mi-avail-toggle input:checked + .mi-toggle-track::after { transform:translateX(18px);background:#fff; }
    .mi-actions { display:flex;gap:.35rem;flex-shrink:0; }
    .mi-btn {
      width:30px;height:30px;border-radius:7px;border:1px solid var(--border);
      background:var(--surface2);display:grid;place-items:center;
      color:var(--text3);font-size:.85rem;transition:all .15s;
    }
    .mi-btn:hover { border-color:var(--border2);color:var(--text); }
    .mi-btn.del:hover { border-color:rgba(224,90,43,.4);color:var(--jerk);background:rgba(224,90,43,.07); }

    /* ── ITEM MODAL ── */
    .item-modal-overlay {
      position:fixed;inset:0;z-index:500;
      background:rgba(12,10,7,.92);backdrop-filter:blur(8px);
      display:flex;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity .3s;padding:1.25rem;
    }
    .item-modal-overlay.open { opacity:1;pointer-events:all; }
    .item-modal {
      background:var(--surface);border:1px solid var(--border2);
      border-radius:var(--r-xl);padding:2rem;width:100%;max-width:520px;
      max-height:90dvh;overflow-y:auto;
      animation:modalIn .3s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes modalIn { from{opacity:0;transform:scale(.9)} to{opacity:1;transform:scale(1)} }
    .modal-title { font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--cream);margin-bottom:1.5rem; }
    .form-group { margin-bottom:1rem; }
    .form-label { display:block;font-size:.75rem;font-weight:600;color:var(--text3);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.1em; }
    .form-input, .form-select, .form-textarea {
      width:100%;padding:.75rem .875rem;
      background:var(--bg);border:1.5px solid var(--border2);
      border-radius:var(--r);font-size:.875rem;color:var(--text);
      font-family:'Jost',sans-serif;transition:border-color .2s;
    }
    .form-input:focus,.form-select:focus,.form-textarea:focus {
      outline:none;border-color:var(--gold);background:rgba(212,168,67,.03);
    }
    .form-input::placeholder,.form-textarea::placeholder { color:var(--text4); }
    .form-textarea { resize:vertical;min-height:80px; }
    .form-select option { background:var(--surface2); }
    .form-row { display:grid;grid-template-columns:1fr 1fr;gap:.875rem; }
    .modal-actions { display:flex;gap:.75rem;margin-top:1.5rem; }
    .btn-modal-save {
      flex:1;padding:.85rem;border-radius:var(--r);
      background:var(--gold);color:#0C0A07;font-size:.875rem;font-weight:700;
      border:none;transition:all .18s;
    }
    .btn-modal-save:hover { background:var(--gold-lt); }
    .btn-modal-cancel {
      padding:.85rem 1.25rem;border-radius:var(--r);
      background:transparent;color:var(--text3);font-size:.875rem;
      border:1px solid var(--border);transition:all .18s;
    }
    .btn-modal-cancel:hover { border-color:var(--border2); }

    /* ── EMPTY ── */
    .a-empty {
      padding:3rem;text-align:center;color:var(--text4);
      display:flex;flex-direction:column;align-items:center;gap:.75rem;
    }
    .a-empty-icon { font-size:2.5rem; }
    .a-empty p { font-size:.82rem;max-width:240px;line-height:1.6; }

    /* ── RESPONSIVE ── */
    @media(max-width:1100px) { .a-stats-grid { grid-template-columns:repeat(2,1fr); } }
    @media(max-width:900px) {
      .a-layout { flex-direction:column; }
      .a-nav { width:100%;height:auto;position:relative;top:0;flex-direction:row;flex-wrap:wrap;padding:.625rem;gap:.25rem;border-right:none;border-bottom:1px solid var(--border); }
      .a-nav-section-label { display:none; }
      .a-main { padding:1.25rem; }
    }
    @media(max-width:640px) {
      .a-stats-grid { grid-template-columns:repeat(2,1fr); gap:.625rem; }
      .filter-tabs { flex-wrap:wrap; }
      .order-row-top { gap:.5rem;flex-wrap:wrap; }
      .form-row { grid-template-columns:1fr; }
      .a-topnav { padding:0 1rem;gap:.5rem; }
    }
  </style>
</head>
<body>

<!-- ── TOP NAV ── -->
<nav class="a-topnav">
  <div class="a-brand">
    <div class="a-logo">📊</div>
    <div>
      <div class="a-brand-text">Admin Panel</div>
      <div class="a-brand-tag">Nola's Events</div>
    </div>
  </div>
  <div class="a-spacer"></div>
  <button id="reset-demo-btn">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    Reset Demo
  </button>
  <button class="a-tour-btn" onclick="Tour.restart('admin')">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
    Tour
  </button>
  <a href="kitchen.html" class="a-nav-link">Kitchen</a>
  <a href="index.html"   class="a-nav-link">Home</a>
</nav>

<div class="a-layout">

  <!-- ── SIDEBAR NAV ── -->
  <nav class="a-nav">
    <div class="a-nav-section-label">Overview</div>
    <button class="a-nav-item active" data-view="orders">
      <span class="a-nav-item-icon">📋</span> Orders
    </button>
    <button class="a-nav-item" data-view="menu">
      <span class="a-nav-item-icon">🍽️</span> Menu Manager
    </button>
    <div class="a-nav-section-label">Quick Links</div>
    <a href="menu.html"   class="a-nav-item"><span class="a-nav-item-icon">🛒</span> Guest Menu</a>
    <a href="kitchen.html" class="a-nav-item"><span class="a-nav-item-icon">🔥</span> Kitchen Display</a>
  </nav>

  <!-- ── MAIN ── -->
  <main class="a-main">

    <!-- STATS -->
    <div class="a-stats-grid" id="stats-grid">
      <div class="stat-card stat-card-revenue">
        <div class="stat-icon" style="background:var(--gold-pale);color:var(--gold)">💰</div>
        <div class="stat-label">Today's Revenue</div>
        <div class="stat-value" id="stat-revenue">—</div>
        <div class="stat-sub" id="stat-revenue-sub">Loading…</div>
      </div>
      <div class="stat-card stat-card-orders">
        <div class="stat-icon" style="background:rgba(91,155,213,.1);color:var(--blue)">📦</div>
        <div class="stat-label">Orders Today</div>
        <div class="stat-value" id="stat-orders-today">—</div>
        <div class="stat-sub" id="stat-orders-total">Loading…</div>
      </div>
      <div class="stat-card stat-card-pending">
        <div class="stat-icon" style="background:rgba(245,158,11,.1);color:var(--amber)">⏳</div>
        <div class="stat-label">Active Orders</div>
        <div class="stat-value" id="stat-active">—</div>
        <div class="stat-sub">Pending or preparing</div>
      </div>
      <div class="stat-card stat-card-avg">
        <div class="stat-icon" style="background:var(--green-lt);color:var(--green)">📈</div>
        <div class="stat-label">Avg Order Value</div>
        <div class="stat-value" id="stat-avg">—</div>
        <div class="stat-sub">All time</div>
      </div>
    </div>

    <!-- ── ORDERS VIEW ── -->
    <div id="view-orders">
      <div class="section-hdr">
        <div class="section-title">Orders</div>
        <div class="filter-tabs" id="order-filter-tabs">
          <button class="filter-tab active" data-status="all">All</button>
          <button class="filter-tab" data-status="pending">Pending</button>
          <button class="filter-tab" data-status="preparing">Preparing</button>
          <button class="filter-tab" data-status="ready">Ready</button>
          <button class="filter-tab" data-status="completed">Completed</button>
        </div>
      </div>
      <div class="orders-table" id="orders-table"></div>
    </div>

    <!-- ── MENU VIEW ── -->
    <div id="view-menu" style="display:none">
      <div class="section-hdr">
        <div class="section-title">Menu Manager</div>
        <button class="btn-add-item" id="btn-add-item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Item
        </button>
      </div>
      <div class="menu-mgr-toolbar">
        <div class="menu-cat-filter" id="menu-cat-filter"></div>
      </div>
      <div class="menu-items-list" id="menu-items-list"></div>
    </div>

  </main>
</div>

<!-- ── ITEM MODAL ── -->
<div class="item-modal-overlay" id="item-modal">
  <div class="item-modal">
    <div class="modal-title" id="modal-title">Add Menu Item</div>
    <div class="form-group">
      <label class="form-label">Name</label>
      <input type="text" id="f-name" class="form-input" placeholder="e.g. Jerk Chicken — Half">
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea id="f-desc" class="form-textarea" placeholder="Describe the dish…"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Category</label>
        <select id="f-cat" class="form-select">
          <option value="jerk">Jerk Centre</option>
          <option value="mains">Main Dishes</option>
          <option value="sides">Sides & Extras</option>
          <option value="bar">Bar & Cocktails</option>
          <option value="desserts">Ice Cream & Pastry</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Price (J$)</label>
        <input type="number" id="f-price" class="form-input" placeholder="850" min="0" step="50">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Kitchen Station</label>
        <select id="f-station" class="form-select">
          <option value="jerk">🌶️ Jerk</option>
          <option value="grill">🔥 Grill</option>
          <option value="fryer">🍟 Fryer</option>
          <option value="salad">🥗 Salad</option>
          <option value="bar">🍸 Bar</option>
          <option value="oven">🔥 Oven</option>
          <option value="ice cream">🍦 Ice Cream</option>
          <option value="prep">🔪 Prep</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Tags (comma separated)</label>
        <input type="text" id="f-tags" class="form-input" placeholder="Popular, Chef's Pick">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-modal-save" id="modal-save">Save Item</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="app.js"></script>
<script src="tour.js"></script>
<script>
'use strict';
Store.load();

const catEmoji = { jerk:'🌶️', mains:'🍽️', sides:'🌿', bar:'🍸', desserts:'🍦' };

let activeView      = 'orders';
let orderFilter     = 'all';
let menuCatFilter   = 'all';
let editingItemId   = null;
let expandedOrderId = null;

/* ── Stats ── */
function renderStats() {
  const s = Store.getStats();
  document.getElementById('stat-revenue').textContent      = formatPrice(s.todayRevenue);
  document.getElementById('stat-revenue-sub').textContent  = `${s.completedToday} completed today`;
  document.getElementById('stat-orders-today').textContent = s.todayOrders;
  document.getElementById('stat-orders-total').textContent = `${s.totalOrders} total`;
  document.getElementById('stat-active').textContent       = s.pendingOrders;
  document.getElementById('stat-avg').textContent          = s.totalOrders ? formatPrice(s.avgOrderValue) : 'J$0';
}

/* ── Nav view switching ── */
document.querySelectorAll('.a-nav-item[data-view]').forEach(btn => {
  btn.addEventListener('click', () => {
    activeView = btn.dataset.view;
    document.querySelectorAll('.a-nav-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('view-orders').style.display = activeView === 'orders' ? '' : 'none';
    document.getElementById('view-menu').style.display   = activeView === 'menu'   ? '' : 'none';
    if (activeView === 'menu') renderMenuManager();
    else renderOrders();
  });
});

/* ── ORDER FILTER ── */
document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    orderFilter = tab.dataset.status;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderOrders();
  });
});

/* ── RENDER ORDERS ── */
function renderOrders() {
  renderStats();
  const orders = Store.getOrdersByStatus(orderFilter === 'all' ? null : orderFilter);
  const table  = document.getElementById('orders-table');

  if (!orders.length) {
    table.innerHTML = `<div class="a-empty"><div class="a-empty-icon">📋</div><p>No orders found for this filter.</p></div>`;
    return;
  }

  table.innerHTML = orders.map(order => {
    const allItems = order.persons.flatMap(p => p.items);
    const summary  = allItems.slice(0,3).map(i => `${i.quantity}× ${i.name}`).join(', ') + (allItems.length > 3 ? `…` : '');
    const isOpen   = expandedOrderId === order.id;
    const badge    = `<span class="or-badge ${statusClass(order.status)}">${statusLabel(order.status)}</span>`;

    // Expanded detail
    const personRows = order.persons.map(p => `
      ${order.persons.length > 1 ? `<div class="exp-person-name">${escapeHtml(p.name)}</div>` : ''}
      ${p.items.map(it => `
        <div class="exp-item">
          <span class="exp-item-name">${escapeHtml(it.name)}<span class="exp-item-qty">×${it.quantity}</span></span>
          <span class="exp-item-price">${formatPrice(it.price * it.quantity)}</span>
        </div>`).join('')}
    `).join('');

    const NEXT = { pending:'preparing', preparing:'ready', ready:'completed' };
    const NEXT_LABEL = { pending:'Start Preparing', preparing:'Mark Ready', ready:'Complete' };
    const actionBtns = NEXT[order.status] ? `
      <button class="btn-status btn-status-primary" onclick="updateOrderStatus('${order.id}','${NEXT[order.status]}')">
        ${NEXT_LABEL[order.status]}
      </button>` : '';

    return `
      <div class="order-row" id="row-${order.id}">
        <div class="order-row-top" onclick="toggleExpand('${order.id}')">
          <span class="or-id">${order.id}</span>
          <span class="or-table">${order.orderType==='takeout'?'🛍 Takeout':'Table '+escapeHtml(order.tableNumber)}</span>
          <div class="or-info"><div class="or-items">${escapeHtml(summary)}</div></div>
          <span class="or-time">${timeSince(order.createdAt)}</span>
          ${badge}
          <span class="or-total">${formatPrice(order.total)}</span>
        </div>
        <div class="order-row-expand${isOpen?' open':''}" id="exp-${order.id}">
          <div class="expand-persons" style="padding-top:.25rem">${personRows}</div>
          ${order.notes ? `<div class="exp-notes">⚠ ${escapeHtml(order.notes)}</div>` : ''}
          <div class="exp-totals">
            <div class="exp-row"><span>Subtotal</span><span>${formatPrice(order.subtotal)}</span></div>
            <div class="exp-row"><span>GCT (15%)</span><span>${formatPrice(order.tax)}</span></div>
            ${order.gratuity ? `<div class="exp-row"><span>Gratuity</span><span>${formatPrice(order.gratuity)}</span></div>` : ''}
            <div class="exp-total-row"><span>Total</span><span>${formatPrice(order.total)}</span></div>
          </div>
          <div class="exp-actions">
            ${actionBtns}
            ${order.status !== 'completed' ? `<button class="btn-status btn-status-ghost" onclick="updateOrderStatus('${order.id}','completed')">Mark Completed</button>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

function toggleExpand(id) {
  expandedOrderId = expandedOrderId === id ? null : id;
  renderOrders();
}

function updateOrderStatus(id, status) {
  Store.updateOrderStatus(id, status);
  showToast(`${id} → ${statusLabel(status)}`, 'success');
  renderOrders();
}

/* ── MENU MANAGER ── */
function renderMenuManager() {
  renderStats();
  // Cat filter buttons
  const catFilter = document.getElementById('menu-cat-filter');
  const cats = [{ id:'all', name:'All' }, ...Store.categories];
  catFilter.innerHTML = cats.map(c =>
    `<button class="filter-tab${menuCatFilter===c.id?' active':''}" data-mcat="${c.id}">
      ${catEmoji[c.id]||''} ${c.name}
    </button>`
  ).join('');
  catFilter.querySelectorAll('.filter-tab').forEach(btn => btn.addEventListener('click', () => {
    menuCatFilter = btn.dataset.mcat;
    renderMenuManager();
  }));

  const items = menuCatFilter === 'all' ? Store.menu : Store.menu.filter(i => i.category === menuCatFilter);
  const list  = document.getElementById('menu-items-list');

  if (!items.length) {
    list.innerHTML = `<div class="a-empty"><div class="a-empty-icon">🍽️</div><p>No items in this category.</p></div>`;
    return;
  }

  list.innerHTML = items.map(item => `
    <div class="menu-item-row${item.available?'':' unavailable'}" id="mi-${item.id}">
      <div class="mi-emoji">${catEmoji[item.category]||'🍽️'}</div>
      <div class="mi-info">
        <div class="mi-name">${escapeHtml(item.name)}</div>
        <div class="mi-cat">${escapeHtml(item.category)} · ${escapeHtml(item.station||'prep')}</div>
      </div>
      <div class="mi-price">${formatPrice(item.price)}</div>
      <label class="mi-avail-toggle" title="${item.available?'Available — click to 86':'Unavailable — click to restore'}">
        <input type="checkbox" ${item.available?'checked':''} onchange="toggleAvail('${item.id}')">
        <div class="mi-toggle-track"></div>
      </label>
      <div class="mi-actions">
        <button class="mi-btn" title="Edit" onclick="openEditModal('${item.id}')">✏️</button>
        <button class="mi-btn del" title="Delete" onclick="deleteItem('${item.id}')">🗑</button>
      </div>
    </div>
  `).join('');
}

function toggleAvail(id) {
  const item = Store.toggleAvailability(id);
  showToast(`${item.name} — ${item.available ? 'Now available' : '86\'d'}`, item.available ? 'success' : 'default');
  renderMenuManager();
}

function deleteItem(id) {
  const item = Store.menu.find(i => i.id === id);
  if (!item) return;
  if (!confirm(`Delete "${item.name}"? This cannot be undone.`)) return;
  Store.deleteMenuItem(id);
  showToast(`${item.name} deleted`, 'default');
  renderMenuManager();
}

/* ── ITEM MODAL ── */
function openAddModal() {
  editingItemId = null;
  document.getElementById('modal-title').textContent = 'Add Menu Item';
  ['f-name','f-desc','f-tags'].forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('f-price').value   = '';
  document.getElementById('f-cat').value     = 'jerk';
  document.getElementById('f-station').value = 'jerk';
  document.getElementById('item-modal').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 80);
}

function openEditModal(id) {
  const item = Store.menu.find(i => i.id === id);
  if (!item) return;
  editingItemId = id;
  document.getElementById('modal-title').textContent = 'Edit Menu Item';
  document.getElementById('f-name').value    = item.name;
  document.getElementById('f-desc').value    = item.description || '';
  document.getElementById('f-price').value   = item.price;
  document.getElementById('f-cat').value     = item.category;
  document.getElementById('f-station').value = item.station || 'prep';
  document.getElementById('f-tags').value    = (item.tags||[]).join(', ');
  document.getElementById('item-modal').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 80);
}

function closeModal() { document.getElementById('item-modal').classList.remove('open'); }

document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('item-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('item-modal')) closeModal();
});

document.getElementById('modal-save').addEventListener('click', () => {
  const name  = document.getElementById('f-name').value.trim();
  const price = parseFloat(document.getElementById('f-price').value);
  if (!name || isNaN(price) || price < 0) {
    showToast('Please fill in name and price', 'error'); return;
  }
  const data = {
    name,
    description: document.getElementById('f-desc').value.trim(),
    price,
    category: document.getElementById('f-cat').value,
    station:  document.getElementById('f-station').value,
    tags: document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean)
  };
  if (editingItemId) {
    Store.updateMenuItem(editingItemId, data);
    showToast(`${name} updated`, 'success');
  } else {
    Store.addMenuItem(data);
    showToast(`${name} added to menu`, 'success');
  }
  closeModal();
  renderMenuManager();
});

document.getElementById('btn-add-item').addEventListener('click', openAddModal);

/* ── Reset demo ── */
document.getElementById('reset-demo-btn').addEventListener('click', () => {
  if (!confirm('Reset all orders and menu to demo defaults?')) return;
  Store.resetDemo();
  renderStats();
  if (activeView === 'orders') renderOrders();
  else renderMenuManager();
  showToast('Demo data restored', 'success');
});

/* ── Auto-refresh stats ── */
renderStats();
renderOrders();
setInterval(() => { renderStats(); if (activeView === 'orders') renderOrders(); }, 10000);

Tour.init('admin');
</script>
</body>
</html>
