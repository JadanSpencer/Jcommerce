<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu &mdash; D&amp;D Wholesale Ltd</title>
<meta name="description" content="Browse wholesale groceries at D&D Wholesale, Papine Plaza. Case pricing, bundles, and top-up specials.">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="site-header"></div>

<main>
  <div class="page-head">
    <div class="container page-head__row">
      <div>
        <span class="eyebrow">Counter 01 &middot; Full Stock List</span>
        <h1>Wholesale Menu</h1>
        <p class="page-head__lede">All pricing shown per case, bag, or bundle &mdash; quantity discounts built in.</p>
      </div>
      <div class="btn-row">
        <button class="btn btn--ghost btn--sm" id="clear-cart-btn" title="Clear cart" style="border-color:rgba(255,255,255,.3); color:var(--white);">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          Clear Cart
        </button>
        <a href="queue.html" class="btn btn--primary btn--sm" id="view-cart-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="20" r="1"/><circle cx="17" cy="20" r="1"/><path d="M5 6h16l-1.5 9h-13z"/></svg>
          View Cart (<span id="cart-count">0</span>)
        </a>
      </div>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="search-row">
        <div class="field" style="flex:1">
          <input type="text" id="search-input" placeholder="Search items..." autocomplete="off">
        </div>
        <button class="btn btn--ghost" id="reset-search">Reset</button>
      </div>

      <div class="filter-bar" id="category-filters"></div>

      <div id="menu-grid" class="product-grid">
        <div class="notice">Loading menu...</div>
      </div>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<!-- Add to Cart Modal -->
<div id="modal-overlay" class="modal-overlay" hidden>
  <div class="modal">
    <div class="modal__head">
      <h3 id="modal-title">Add to Cart</h3>
      <button class="icon-btn" id="close-modal">✕</button>
    </div>
    <div class="modal__body">
      <p id="modal-product-name" style="font-weight:700; font-family: var(--font-display); font-size: var(--text-lg); color: var(--ink);"></p>
      <div class="field">
        <label>Quantity</label>
        <div style="display:flex; gap:.5rem; align-items:center">
          <button class="icon-btn" id="qty-minus" style="border: 1.5px solid var(--hairline); border-radius: var(--radius-sm);">−</button>
          <input type="number" id="modal-qty" value="1" min="1" step="1" style="width:5rem; text-align:center; font-family: var(--font-mono); font-weight: 700;">
          <button class="icon-btn" id="qty-plus" style="border: 1.5px solid var(--hairline); border-radius: var(--radius-sm);">+</button>
        </div>
        <span class="field__hint" id="modal-unit">Unit: case</span>
      </div>
      <p style="font-family: var(--font-mono); font-size: var(--text-xl); font-weight: 700; color: var(--navy);" id="modal-price-display"></p>
    </div>
    <div class="modal__foot">
      <button class="btn btn--ghost" id="cancel-modal">Cancel</button>
      <button class="btn btn--primary" id="confirm-add">Add to Cart</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="js/data.js"></script>
<script src="js/layout.js"></script>
<script src="js/menu.js"></script>
</body>
</html>
