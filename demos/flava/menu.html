<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0D0805">
  <title>Flava Fingaz — Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --char:  #0D0805;
      --oak:   #1A1008;
      --mahog: #2A1506;
      --flame: #FF4D00;
      --ember: #FF8C00;
      --gold:  #FFD700;
      --cream: #E8D5B0;
      --ash:   #9A8A70;
      --smoke: #4A3A28;
      --r:4px;
      --nav-h: 68px;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }

    body {
      font-family:'Space Grotesk',sans-serif;
      background:var(--char); color:var(--cream);
      min-height:100dvh; overflow-x:hidden;
    }

    /* Grain */
    body::before {
      content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity:.04; mix-blend-mode:overlay;
    }

    a { color:inherit; text-decoration:none; }
    button { font-family:'Space Grotesk',sans-serif; cursor:pointer; }

    /* ── NAV ── */
    .nav {
      position:sticky; top:0; z-index:200;
      height:var(--nav-h);
      display:flex; align-items:center; padding:0 2rem; gap:1.5rem;
      background:rgba(13,8,5,.92);
      backdrop-filter:blur(24px);
      border-bottom:1px solid rgba(255,77,0,.1);
    }

    .nav-back {
      display:flex; align-items:center; gap:.5rem;
      font-size:.72rem; font-weight:600; letter-spacing:.12em;
      text-transform:uppercase; color:var(--ash);
      transition:color .2s;
    }
    .nav-back:hover { color:var(--cream); }
    .nav-back svg { flex-shrink:0; }

    .nav-brand {
      font-family:'Bebas Neue',sans-serif;
      font-size:1.4rem; letter-spacing:.08em; color:var(--cream);
    }
    .nav-brand span { color:var(--flame); }

    .nav-spacer { flex:1; }

    .table-chip {
      display:flex; align-items:center; gap:.5rem;
      padding:.35rem .9rem;
      background:rgba(255,77,0,.08);
      border:1px solid rgba(255,77,0,.2);
      border-radius:2px;
      font-size:.7rem; font-weight:700; letter-spacing:.12em;
      text-transform:uppercase; color:var(--ember);
    }

    .table-chip-dot {
      width:5px; height:5px; border-radius:50%;
      background:var(--flame);
      box-shadow:0 0 6px var(--flame);
      animation:blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── LAYOUT ── */
    .layout {
      display:grid;
      grid-template-columns:1fr 380px;
      min-height:calc(100dvh - var(--nav-h));
      position:relative; z-index:1;
    }

    /* ── MENU LEFT ── */
    .menu-col { overflow:hidden; }

    /* Category rail */
    .cat-rail {
      position:sticky; top:var(--nav-h); z-index:100;
      background:rgba(13,8,5,.95);
      backdrop-filter:blur(16px);
      border-bottom:1px solid rgba(255,77,0,.08);
      padding:0 2rem;
      overflow-x:auto;
      scrollbar-width:none;
    }
    .cat-rail::-webkit-scrollbar { display:none; }

    .cat-rail-inner {
      display:flex; gap:0;
      white-space:nowrap;
    }

    .cat-btn {
      position:relative;
      padding:.9rem 1.25rem;
      background:transparent; border:none;
      color:var(--smoke);
      font-size:.72rem; font-weight:700; letter-spacing:.14em;
      text-transform:uppercase;
      transition:color .2s;
      flex-shrink:0;
    }

    .cat-btn::after {
      content:''; position:absolute;
      bottom:0; left:50%; right:50%;
      height:2px;
      background:var(--flame);
      box-shadow:0 0 8px var(--flame);
      transition:all .25s;
    }

    .cat-btn.active { color:var(--cream); }
    .cat-btn.active::after { left:1.25rem; right:1.25rem; }
    .cat-btn:hover:not(.active) { color:var(--ash); }

    /* Person tabs */
    .person-strip {
      padding:.875rem 2rem;
      border-bottom:1px solid rgba(255,255,255,.04);
      display:flex; gap:.4rem; align-items:center;
      overflow-x:auto; scrollbar-width:none;
    }
    .person-strip::-webkit-scrollbar { display:none; }

    .person-tab {
      padding:.35rem .875rem; border-radius:2px;
      border:1.5px solid var(--smoke);
      background:transparent; color:var(--ash);
      font-size:.72rem; font-weight:700; letter-spacing:.1em;
      text-transform:uppercase;
      cursor:pointer; transition:all .2s;
      white-space:nowrap;
    }
    .person-tab.active {
      border-color:var(--flame); color:var(--flame);
      background:rgba(255,77,0,.06);
    }
    .person-tab:hover:not(.active) { border-color:var(--ash); color:var(--cream); }

    .add-person-btn {
      padding:.35rem .875rem; border-radius:2px;
      border:1.5px dashed var(--smoke);
      background:transparent; color:var(--smoke);
      font-size:.72rem; font-weight:700; letter-spacing:.1em;
      text-transform:uppercase;
      cursor:pointer; transition:all .2s;
      white-space:nowrap;
    }
    .add-person-btn:hover { border-color:var(--flame); color:var(--flame); }

    /* Menu content */
    .menu-content { padding:0 2rem 5rem; }

    /* Category section */
    .cat-section { padding-top:2rem; }

    .cat-section-hdr {
      display:flex; align-items:center; gap:1rem;
      margin-bottom:1.25rem;
      padding-bottom:1rem;
      border-bottom:1px solid rgba(255,77,0,.1);
    }

    .cat-section-icon { font-size:1.5rem; }

    .cat-section-name {
      font-family:'Bebas Neue',sans-serif;
      font-size:1.5rem; letter-spacing:.08em;
      color:var(--cream);
    }

    .cat-section-desc {
      font-size:.72rem; color:var(--ash);
      letter-spacing:.06em; text-transform:uppercase;
      margin-left:auto;
    }

    /* Menu item cards */
    .menu-items { display:flex; flex-direction:column; gap:.5rem; }

    .menu-card {
      display:grid;
      grid-template-columns:1fr auto;
      gap:1rem;
      padding:1.25rem;
      background:var(--oak);
      border:1px solid rgba(255,255,255,.04);
      border-radius:var(--r);
      transition:all .2s;
      position:relative;
      overflow:hidden;
    }

    .menu-card::before {
      content:''; position:absolute;
      left:0; top:0; bottom:0; width:2px;
      background:var(--flame);
      transform:scaleY(0);
      transition:transform .25s;
    }

    .menu-card:hover { border-color:rgba(255,77,0,.2); }
    .menu-card:hover::before { transform:scaleY(1); }
    .menu-card.featured { border-color:rgba(255,77,0,.15); }
    .menu-card.featured::before { transform:scaleY(1); background:var(--ember); }
    .menu-card.unavailable { opacity:.4; pointer-events:none; }

    .mc-body {}

    .mc-top {
      display:flex; align-items:flex-start;
      gap:.75rem; margin-bottom:.4rem;
    }

    .mc-name {
      font-family:'Bebas Neue',sans-serif;
      font-size:1.1rem; letter-spacing:.06em;
      color:var(--cream); line-height:1.2;
      flex:1;
    }

    .mc-tags {
      display:flex; flex-wrap:wrap; gap:.3rem;
      margin-bottom:.5rem;
    }

    .mc-tag {
      padding:.1rem .5rem;
      font-size:.6rem; font-weight:700; letter-spacing:.1em;
      text-transform:uppercase; border-radius:2px;
    }

    .tag-flame { background:rgba(255,77,0,.15); color:var(--flame); }
    .tag-gold  { background:rgba(255,215,0,.12); color:var(--gold); }
    .tag-green { background:rgba(80,200,100,.12); color:#6EC97A; }
    .tag-ash   { background:rgba(154,138,112,.1); color:var(--ash); }

    .mc-desc {
      font-size:.78rem; color:var(--ash);
      line-height:1.6; font-weight:400;
    }

    .mc-right {
      display:flex; flex-direction:column;
      align-items:flex-end; justify-content:space-between;
      flex-shrink:0; gap:.75rem;
    }

    .mc-price {
      font-family:'Courier Prime',monospace;
      font-size:1rem; font-weight:700;
      color:var(--ember);
      white-space:nowrap;
    }

    /* Qty control */
    .qty-ctrl {
      display:flex; align-items:center; gap:.35rem;
    }

    .qty-btn {
      width:28px; height:28px; border-radius:2px;
      border:1.5px solid rgba(255,77,0,.3);
      background:transparent;
      color:var(--ash);
      font-size:1.1rem; line-height:1;
      display:grid; place-items:center;
      transition:all .15s;
    }

    .qty-btn:hover { border-color:var(--flame); color:var(--flame); }

    .qty-btn.add {
      background:var(--flame); border-color:var(--flame);
      color:#0D0805;
      box-shadow:0 0 12px rgba(255,77,0,.3);
    }
    .qty-btn.add:hover { background:var(--ember); box-shadow:0 0 20px rgba(255,77,0,.5); }

    .qty-num {
      font-family:'Courier Prime',monospace;
      font-size:.9rem; font-weight:700;
      color:var(--cream);
      min-width:18px; text-align:center;
    }

    .unavail-badge {
      font-size:.65rem; color:var(--smoke);
      letter-spacing:.1em; text-transform:uppercase;
    }

    /* ── SIDEBAR CART ── */
    .cart-col {
      background:var(--oak);
      border-left:1px solid rgba(255,77,0,.08);
      position:sticky; top:var(--nav-h);
      height:calc(100dvh - var(--nav-h));
      display:flex; flex-direction:column;
      overflow:hidden;
    }

    .cart-hdr {
      padding:1.25rem 1.5rem;
      border-bottom:1px solid rgba(255,77,0,.1);
      display:flex; align-items:center; justify-content:space-between;
    }

    .cart-title {
      font-family:'Bebas Neue',sans-serif;
      font-size:1.2rem; letter-spacing:.08em; color:var(--cream);
    }

    .cart-count {
      font-family:'Courier Prime',monospace;
      font-size:.75rem; font-weight:700;
      padding:.2rem .65rem; border-radius:2px;
      background:rgba(255,77,0,.12);
      color:var(--flame);
      border:1px solid rgba(255,77,0,.2);
    }

    /* cart amber neon line */
    .cart-hdr::after {
      display:none; /* removed — handled by the border */
    }

    .cart-body {
      flex:1; overflow-y:auto; padding:.5rem 0;
    }
    .cart-body::-webkit-scrollbar { width:3px; }
    .cart-body::-webkit-scrollbar-thumb { background:var(--smoke); border-radius:1px; }

    .cart-empty {
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      height:100%; gap:1rem;
      color:var(--smoke); text-align:center; padding:2rem;
    }

    .cart-empty-icon {
      font-size:2.5rem;
      filter:grayscale(1) opacity(.4);
    }

    .cart-empty-msg {
      font-size:.8rem; line-height:1.6;
      color:var(--smoke);
    }

    .cart-person-block {
      padding:.75rem 1.5rem;
      border-bottom:1px solid rgba(255,255,255,.04);
    }

    .cart-person-name {
      font-size:.6rem; font-weight:700; letter-spacing:.18em;
      text-transform:uppercase; color:var(--smoke);
      margin-bottom:.5rem;
    }

    .cart-item {
      display:flex; align-items:center; gap:.625rem;
      padding:.45rem 0;
      border-bottom:1px solid rgba(255,255,255,.03);
    }
    .cart-item:last-child { border-bottom:none; }

    .ci-name {
      flex:1; font-size:.8rem; font-weight:500; color:var(--cream);
      line-height:1.3;
    }

    .ci-controls { display:flex; align-items:center; gap:.25rem; }

    .ci-btn {
      width:20px; height:20px;
      border-radius:2px; border:1px solid var(--smoke);
      background:transparent; color:var(--ash);
      font-size:.85rem; line-height:1;
      display:grid; place-items:center;
      cursor:pointer; transition:all .15s;
    }
    .ci-btn:hover { border-color:var(--flame); color:var(--flame); }

    .ci-qty {
      font-family:'Courier Prime',monospace;
      font-size:.8rem; font-weight:700;
      color:var(--cream); min-width:16px; text-align:center;
    }

    .ci-price {
      font-family:'Courier Prime',monospace;
      font-size:.82rem; font-weight:700;
      color:var(--ember); flex-shrink:0;
    }

    /* Cart footer */
    .cart-ftr {
      padding:1.25rem 1.5rem;
      border-top:1px solid rgba(255,77,0,.1);
      background:var(--oak);
    }

    .cart-notes {
      width:100%; padding:.65rem .875rem;
      background:rgba(13,8,5,.8);
      border:1.5px solid rgba(255,77,0,.12);
      border-radius:var(--r);
      color:var(--cream); font-family:'Space Grotesk',sans-serif;
      font-size:.78rem; resize:none; min-height:48px;
      transition:border-color .2s; margin-bottom:1rem;
    }
    .cart-notes:focus { outline:none; border-color:var(--flame); }
    .cart-notes::placeholder { color:var(--smoke); }

    .cart-line {
      display:flex; justify-content:space-between;
      font-size:.75rem; color:var(--ash); margin-bottom:.25rem;
    }

    .cart-line span:last-child { font-family:'Courier Prime',monospace; }

    .cart-total-line {
      display:flex; justify-content:space-between;
      font-size:.95rem; font-weight:700;
      color:var(--cream);
      padding:.75rem 0 1rem;
      border-top:1px solid rgba(255,77,0,.1);
      margin-top:.25rem;
    }

    .cart-total-line span:last-child {
      font-family:'Courier Prime',monospace;
      color:var(--ember);
    }

    .btn-order {
      width:100%; padding:1rem;
      background:var(--flame); border:none; border-radius:var(--r);
      color:#0D0805;
      font-family:'Space Grotesk',sans-serif;
      font-size:.82rem; font-weight:700; letter-spacing:.14em;
      text-transform:uppercase;
      cursor:pointer; transition:all .25s;
      box-shadow:0 0 24px rgba(255,77,0,.25);
      position:relative; overflow:hidden;
    }

    .btn-order::before {
      content:''; position:absolute; inset:0;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.15), transparent);
      transform:translateX(-100%); transition:transform .4s ease;
    }

    .btn-order:hover:not(:disabled) {
      background:var(--ember);
      box-shadow:0 0 40px rgba(255,77,0,.45);
      transform:translateY(-1px);
    }
    .btn-order:hover:not(:disabled)::before { transform:translateX(100%); }
    .btn-order:disabled { opacity:.35; cursor:not-allowed; }

    /* ── MOBILE FAB ── */
    .fab {
      display:none;
      position:fixed; bottom:1.25rem; right:1.25rem; z-index:150;
      background:var(--flame); border:none; border-radius:2px;
      padding:.8rem 1.4rem;
      color:#0D0805;
      font-family:'Space Grotesk',sans-serif;
      font-size:.82rem; font-weight:700; letter-spacing:.1em;
      text-transform:uppercase;
      cursor:pointer;
      box-shadow:0 8px 28px rgba(255,77,0,.45);
      align-items:center; gap:.5rem;
      transition:all .2s;
    }
    .fab:hover { background:var(--ember); transform:translateY(-2px); }

    /* ── DRAWER ── */
    .drawer-bg {
      position:fixed; inset:0; z-index:250;
      background:rgba(13,8,5,.75); backdrop-filter:blur(6px);
      opacity:0; pointer-events:none; transition:opacity .3s;
    }
    .drawer-bg.open { opacity:1; pointer-events:all; }

    .drawer {
      position:fixed; bottom:0; left:0; right:0; z-index:251;
      background:var(--oak);
      border-radius:6px 6px 0 0;
      border-top:1px solid rgba(255,77,0,.2);
      max-height:90dvh; overflow-y:auto;
      transform:translateY(100%);
      transition:transform .35s cubic-bezier(.22,1,.36,1);
    }
    .drawer-bg.open .drawer { transform:translateY(0); }

    .drawer-handle {
      width:36px; height:3px; border-radius:2px;
      background:rgba(255,77,0,.3);
      margin:1rem auto .75rem;
    }

    .drawer-hdr {
      padding:0 1.25rem .75rem;
      display:flex; align-items:center; justify-content:space-between;
    }

    .drawer-title {
      font-family:'Bebas Neue',sans-serif;
      font-size:1.1rem; letter-spacing:.08em; color:var(--cream);
    }

    .drawer-close {
      width:28px; height:28px; border-radius:2px;
      background:var(--mahog); border:none;
      color:var(--ash); font-size:.9rem;
      display:grid; place-items:center;
      cursor:pointer; transition:all .15s;
    }
    .drawer-close:hover { color:var(--cream); }

    .drawer-body {
      padding:0 1.25rem; max-height:45dvh; overflow-y:auto;
    }

    .drawer-ftr { padding:1.25rem; }

    /* ── SUCCESS MODAL ── */
    .modal-bg {
      position:fixed; inset:0; z-index:400;
      background:rgba(13,8,5,.9); backdrop-filter:blur(12px);
      display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none; transition:opacity .3s;
      padding:1.25rem;
    }
    .modal-bg.open { opacity:1; pointer-events:all; }

    .modal {
      background:var(--oak);
      border:1px solid rgba(255,77,0,.25);
      border-radius:4px;
      padding:2.5rem;
      max-width:400px; width:100%;
      text-align:center;
      animation:modalIn .35s cubic-bezier(.34,1.56,.64,1) both;
      position:relative; overflow:hidden;
    }

    .modal::before {
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg, transparent, var(--flame), transparent);
    }

    @keyframes modalIn {
      from { opacity:0; transform:scale(.88) translateY(16px); }
      to   { opacity:1; transform:scale(1)   translateY(0); }
    }

    .modal-icon {
      width:64px; height:64px; border-radius:50%;
      background:rgba(255,77,0,.1); border:1px solid rgba(255,77,0,.25);
      display:grid; place-items:center;
      font-size:1.8rem; margin:0 auto 1.5rem;
    }

    .modal-title {
      font-family:'Bebas Neue',sans-serif;
      font-size:2rem; letter-spacing:.06em;
      color:var(--cream); margin-bottom:.5rem;
    }

    .modal-sub {
      font-size:.85rem; color:var(--ash); line-height:1.65;
      margin-bottom:1rem;
    }

    .modal-id {
      display:inline-block;
      font-family:'Courier Prime',monospace;
      font-size:.8rem; color:var(--flame);
      padding:.3rem .85rem; border-radius:2px;
      background:rgba(255,77,0,.08);
      border:1px solid rgba(255,77,0,.2);
      margin-bottom:1.75rem;
    }

    .modal-actions { display:flex; gap:.75rem; justify-content:center; }

    .btn-modal-primary {
      padding:.75rem 1.5rem; border-radius:var(--r);
      background:var(--flame); color:#0D0805;
      font-family:'Space Grotesk',sans-serif;
      font-size:.82rem; font-weight:700; letter-spacing:.1em;
      text-transform:uppercase; border:none; cursor:pointer;
      transition:all .2s;
    }
    .btn-modal-primary:hover { background:var(--ember); }

    .btn-modal-ghost {
      padding:.75rem 1.5rem; border-radius:var(--r);
      background:transparent; color:var(--ash);
      font-family:'Space Grotesk',sans-serif;
      font-size:.82rem; font-weight:600;
      border:1px solid var(--smoke);
      cursor:pointer; transition:all .2s;
    }
    .btn-modal-ghost:hover { border-color:var(--ash); color:var(--cream); }

    /* ── ADD PERSON MODAL ── */
    .ap-bg {
      position:fixed; inset:0; z-index:350;
      background:rgba(13,8,5,.88); backdrop-filter:blur(8px);
      display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none; transition:opacity .3s; padding:1.25rem;
    }
    .ap-bg.open { opacity:1; pointer-events:all; }

    .ap-modal {
      background:var(--oak);
      border:1px solid rgba(255,77,0,.2);
      border-radius:4px; padding:2rem;
      max-width:340px; width:100%;
      animation:modalIn .3s cubic-bezier(.34,1.56,.64,1) both;
    }

    .ap-title {
      font-family:'Bebas Neue',sans-serif;
      font-size:1.4rem; letter-spacing:.06em;
      color:var(--cream); margin-bottom:.3rem;
    }

    .ap-sub {
      font-size:.78rem; color:var(--ash); margin-bottom:1.25rem;
    }

    .ap-input {
      width:100%; padding:.85rem 1rem;
      background:rgba(13,8,5,.8); border:1.5px solid rgba(255,77,0,.2);
      border-radius:var(--r); color:var(--cream);
      font-family:'Space Grotesk',sans-serif; font-size:.95rem;
      margin-bottom:1rem; transition:border-color .2s;
    }
    .ap-input:focus { outline:none; border-color:var(--flame); }
    .ap-input::placeholder { color:var(--smoke); }

    .ap-actions { display:flex; gap:.6rem; }

    .btn-ap-confirm {
      flex:1; padding:.75rem; border-radius:var(--r);
      background:var(--flame); color:#0D0805;
      font-family:'Space Grotesk',sans-serif;
      font-size:.82rem; font-weight:700; letter-spacing:.1em;
      text-transform:uppercase; border:none; cursor:pointer; transition:all .2s;
    }
    .btn-ap-confirm:hover { background:var(--ember); }

    .btn-ap-cancel {
      padding:.75rem 1rem; border-radius:var(--r);
      background:transparent; color:var(--ash);
      font-family:'Space Grotesk',sans-serif; font-size:.82rem;
      border:1px solid var(--smoke); cursor:pointer; transition:all .2s;
    }
    .btn-ap-cancel:hover { border-color:var(--ash); }

    /* ── RESPONSIVE ── */
    @media(max-width:900px) {
      .layout { grid-template-columns:1fr; }
      .cart-col { display:none; }
      .fab { display:flex; }
      .menu-content { padding:0 1.25rem 6rem; }
      .cat-rail { padding:0 1.25rem; }
      .person-strip { padding:.75rem 1.25rem; }
    }

    @media(max-width:640px) {
      .nav { padding:0 1rem; gap:1rem; }
      .cat-section-desc { display:none; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a href="index.html" class="nav-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Back
  </a>
  <div class="nav-brand">FLAVA<span>.</span>FINGAZ</div>
  <div class="nav-spacer"></div>
  <div class="table-chip">
    <span class="table-chip-dot"></span>
    <span id="table-label">Table —</span>
  </div>
</nav>

<div class="layout">

  <!-- ── MENU COLUMN ── -->
  <div class="menu-col">

    <!-- Category rail -->
    <div class="cat-rail">
      <div class="cat-rail-inner" id="cat-rail"></div>
    </div>

    <!-- Person tabs -->
    <div class="person-strip" id="person-strip"></div>

    <!-- Menu content -->
    <div class="menu-content" id="menu-content"></div>
  </div>

  <!-- ── CART SIDEBAR ── -->
  <aside class="cart-col">
    <div class="cart-hdr">
      <span class="cart-title">Your Order</span>
      <span class="cart-count" id="cart-count-badge">0 items</span>
    </div>
    <div class="cart-body" id="cart-body"></div>
    <div class="cart-ftr">
      <textarea class="cart-notes" id="cart-notes" placeholder="Allergies, special requests…" rows="2"></textarea>
      <div class="cart-line"><span>Subtotal</span><span id="cart-subtotal">J$0</span></div>
      <div class="cart-line"><span>GCT (15%)</span><span id="cart-tax">J$0</span></div>
      <div class="cart-total-line"><span>Total</span><span id="cart-total">J$0</span></div>
      <button class="btn-order" id="place-order-btn" disabled>Fire the Order 🔥</button>
    </div>
  </aside>
</div>

<!-- ── MOBILE FAB ── -->
<button class="fab" id="fab-btn">
  🔥 Order
  (<span id="fab-count">0</span>)
  <span id="fab-total" style="font-size:.75rem;opacity:.85"></span>
</button>

<!-- ── DRAWER ── -->
<div class="drawer-bg" id="drawer-bg">
  <div class="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-hdr">
      <span class="drawer-title">Your Order</span>
      <button class="drawer-close" id="drawer-close">✕</button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
    <div class="drawer-ftr">
      <textarea class="cart-notes" id="drawer-notes" placeholder="Allergies, special requests…" rows="2"></textarea>
      <div class="cart-line"><span>Subtotal</span><span id="d-subtotal">J$0</span></div>
      <div class="cart-line"><span>GCT (15%)</span><span id="d-tax">J$0</span></div>
      <div class="cart-total-line"><span>Total</span><span id="d-total">J$0</span></div>
      <button class="btn-order" id="d-place-btn" disabled>Fire the Order 🔥</button>
    </div>
  </div>
</div>

<!-- ── SUCCESS MODAL ── -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-icon">🔥</div>
    <div class="modal-title">ORDER FIRED!</div>
    <p class="modal-sub">Your order is on its way to the kitchen. The flames are lit — sit tight and enjoy the vibe.</p>
    <div class="modal-id" id="modal-order-id">FF-0001</div>
    <div class="modal-actions">
      <button class="btn-modal-ghost" id="modal-continue">Keep Ordering</button>
      <a href="index.html" class="btn-modal-primary">Done</a>
    </div>
  </div>
</div>

<!-- ── ADD PERSON MODAL ── -->
<div class="ap-bg" id="ap-bg">
  <div class="ap-modal">
    <div class="ap-title">ADD GUEST</div>
    <p class="ap-sub">What should we call this person?</p>
    <input type="text" class="ap-input" id="ap-input" placeholder="e.g. Marcus, Guest 2…">
    <div class="ap-actions">
      <button class="btn-ap-cancel" id="ap-cancel">Cancel</button>
      <button class="btn-ap-confirm" id="ap-confirm">Add</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="app.js"></script>
<script>
'use strict';
Store.load();

const catIcons = { grills:'🔥', wings:'🍗', sides:'🌽', burgers:'🍔', sauces:'🌶️', drinks:'🧃' };

const tagMap = t => {
  const hot = ['Bestseller','Signature','Spicy','Staff Pick','Must Try','Premium'].includes(t);
  const eco = ['Vegan','Healthy','Fresh','Non-Alcoholic'].includes(t);
  const feat = ['Featured','Chef\'s Pick','Feed The Table','Crowd Fave'].includes(t);
  return hot ? 'tag-flame' : eco ? 'tag-green' : feat ? 'tag-gold' : 'tag-ash';
};

let activeCat    = 'all';
let activePersonIdx = 0;

// ── Init ──
(function init() {
  const tbl = Store.cart.tableNumber;
  const lbl = tbl
    ? (Store.cart.orderType === 'takeout' ? `Takeout${tbl && tbl!=='Takeout'?' — '+tbl:''}` : `Table ${tbl}`)
    : 'No Table';
  document.getElementById('table-label').textContent = lbl;

  buildCatRail();
  buildPersonStrip();
  buildMenuContent();
  renderCart();
})();

// ── Category rail ──
function buildCatRail() {
  const rail = document.getElementById('cat-rail');
  const cats = [{ id:'all', name:'Everything' }, ...Store.categories];
  rail.innerHTML = cats.map(c =>
    `<button class="cat-btn${activeCat===c.id?' active':''}" data-cat="${c.id}">
      ${catIcons[c.id]||''} ${c.name}
    </button>`
  ).join('');
  rail.querySelectorAll('.cat-btn').forEach(b => b.addEventListener('click', () => {
    activeCat = b.dataset.cat;
    buildCatRail();
    buildMenuContent();
  }));
}

// ── Person tabs ──
function buildPersonStrip() {
  const strip = document.getElementById('person-strip');
  const persons = Store.cart.persons;
  strip.innerHTML = persons.map((p,i) =>
    `<button class="person-tab${i===activePersonIdx?' active':''}" data-idx="${i}">${escapeHtml(p.name)}</button>`
  ).join('') + `<button class="add-person-btn" id="add-guest-btn">+ Add Guest</button>`;
  strip.querySelectorAll('.person-tab').forEach(b => b.addEventListener('click', () => {
    activePersonIdx = +b.dataset.idx;
    buildPersonStrip(); buildMenuContent();
  }));
  document.getElementById('add-guest-btn').addEventListener('click', openApModal);
}

// ── Menu content ──
function buildMenuContent() {
  const content = document.getElementById('menu-content');

  const renderSection = (cat, items) => {
    const catInfo = Store.categories.find(c => c.id === cat);
    if (!catInfo || !items.length) return '';
    return `
      <div class="cat-section" id="section-${cat}">
        <div class="cat-section-hdr">
          <span class="cat-section-icon">${catIcons[cat]||'🍽️'}</span>
          <span class="cat-section-name">${escapeHtml(catInfo.name)}</span>
          <span class="cat-section-desc">${escapeHtml(catInfo.description)}</span>
        </div>
        <div class="menu-items">
          ${items.map(item => buildCard(item)).join('')}
        </div>
      </div>`;
  };

  if (activeCat === 'all') {
    content.innerHTML = Store.categories.map(cat =>
      renderSection(cat.id, Store.menu.filter(i => i.category === cat.id))
    ).join('');
  } else {
    const cat = Store.categories.find(c => c.id === activeCat);
    const items = Store.menu.filter(i => i.category === activeCat);
    content.innerHTML = renderSection(activeCat, items);
  }

  attachCardEvents();
}

function buildCard(item) {
  const qty  = Store.getQty(item.id, activePersonIdx);
  const personName = Store.cart.persons[activePersonIdx]?.name || 'Order';
  const tags = (item.tags||[]).slice(0,3).map(t =>
    `<span class="mc-tag ${tagMap(t)}">${escapeHtml(t)}</span>`
  ).join('');

  return `
    <div class="menu-card${item.featured?' featured':''}${item.available?'':' unavailable'}" data-id="${item.id}">
      <div class="mc-body">
        <div class="mc-top">
          <div class="mc-name">${escapeHtml(item.name)}</div>
        </div>
        ${tags ? `<div class="mc-tags">${tags}</div>` : ''}
        <div class="mc-desc">${escapeHtml(item.description||'')}</div>
      </div>
      <div class="mc-right">
        <div class="mc-price">${formatPrice(item.price)}</div>
        ${item.available ? `
          <div class="qty-ctrl">
            ${qty > 0 ? `
              <button class="qty-btn remove" data-id="${item.id}">−</button>
              <span class="qty-num">${qty}</span>
            ` : ''}
            <button class="qty-btn add" data-id="${item.id}" title="Add to ${escapeHtml(personName)}">+</button>
          </div>` : `<span class="unavail-badge">86'd</span>`}
      </div>
    </div>`;
}

function attachCardEvents() {
  document.querySelectorAll('.qty-btn.add').forEach(btn => btn.addEventListener('click', () => {
    Store.addToCart(btn.dataset.id, activePersonIdx);
    buildMenuContent(); renderCart();
    const item = Store.menu.find(i => i.id === btn.dataset.id);
    if (item) showToast(`🔥 ${item.name} added`, 'success', 1600);
  }));
  document.querySelectorAll('.qty-btn.remove').forEach(btn => btn.addEventListener('click', () => {
    Store.removeFromCart(btn.dataset.id, activePersonIdx);
    buildMenuContent(); renderCart();
  }));
}

// ── Cart ──
function renderCart() {
  const count    = Store.cartCount();
  const subtotal = Store.cartSubtotal();
  const tax      = subtotal * TAX_RATE;
  const total    = subtotal + tax;
  const hasItems = count > 0;

  // Badge
  document.getElementById('cart-count-badge').textContent = `${count} item${count!==1?'s':''}`;

  // FAB
  document.getElementById('fab-count').textContent = count;
  document.getElementById('fab-total').textContent = count > 0 ? `· ${formatPrice(total)}` : '';

  // Totals
  const update = (id, val) => { const el=document.getElementById(id); if(el) el.textContent=val; };
  update('cart-subtotal', formatPrice(subtotal));
  update('cart-tax', formatPrice(tax));
  update('cart-total', formatPrice(total));
  update('d-subtotal', formatPrice(subtotal));
  update('d-tax', formatPrice(tax));
  update('d-total', formatPrice(total));

  // Buttons
  ['place-order-btn','d-place-btn'].forEach(id => {
    const b=document.getElementById(id); if(b) b.disabled=!hasItems;
  });

  const buildBody = () => {
    if (!hasItems) return `
      <div class="cart-empty">
        <div class="cart-empty-icon">🍽️</div>
        <p class="cart-empty-msg">Your order is empty. Pick something from the menu and get it sizzling.</p>
      </div>`;
    let html='';
    Store.cart.persons.forEach((p,pidx) => {
      if (!p.items.length) return;
      html+=`<div class="cart-person-block">
        <div class="cart-person-name">${escapeHtml(p.name)}</div>
        ${p.items.map(item=>`
          <div class="cart-item">
            <div class="ci-name">${escapeHtml(item.name)}</div>
            <div class="ci-controls">
              <button class="ci-btn" data-action="remove" data-id="${item.id}" data-pidx="${pidx}">−</button>
              <span class="ci-qty">${item.quantity}</span>
              <button class="ci-btn" data-action="add" data-id="${item.id}" data-pidx="${pidx}">+</button>
            </div>
            <div class="ci-price">${formatPrice(item.price*item.quantity)}</div>
          </div>`).join('')}
      </div>`;
    });
    return html;
  };

  const body = buildBody();
  const cartBody   = document.getElementById('cart-body');
  const drawerBody = document.getElementById('drawer-body');
  if (cartBody)   cartBody.innerHTML   = body;
  if (drawerBody) drawerBody.innerHTML = body;

  [cartBody,drawerBody].forEach(container => {
    if (!container) return;
    container.querySelectorAll('.ci-btn').forEach(btn => btn.addEventListener('click', () => {
      const pidx = +btn.dataset.pidx;
      btn.dataset.action==='add'
        ? Store.addToCart(btn.dataset.id, pidx)
        : Store.removeFromCart(btn.dataset.id, pidx);
      buildMenuContent(); renderCart();
    }));
  });
}

// Notes sync
document.getElementById('cart-notes').addEventListener('input', e => {
  Store.cart.notes = e.target.value; Store.saveCart();
  const d=document.getElementById('drawer-notes'); if(d) d.value=e.target.value;
});
document.getElementById('drawer-notes').addEventListener('input', e => {
  Store.cart.notes = e.target.value; Store.saveCart();
  const c=document.getElementById('cart-notes'); if(c) c.value=e.target.value;
});

// Place order
function placeOrder() {
  if (Store.cartCount()===0) return;
  const order = Store.placeOrder();
  document.getElementById('modal-order-id').textContent = order.id;
  document.getElementById('modal-bg').classList.add('open');
  closeDrawer(); buildMenuContent(); renderCart();
  showToast('Order sent to kitchen! 🔥', 'success', 3000);
}
document.getElementById('place-order-btn').addEventListener('click', placeOrder);
document.getElementById('d-place-btn').addEventListener('click', placeOrder);
document.getElementById('modal-continue').addEventListener('click', () => {
  document.getElementById('modal-bg').classList.remove('open');
});

// Drawer
function openDrawer() { document.getElementById('drawer-bg').classList.add('open'); }
function closeDrawer() { document.getElementById('drawer-bg').classList.remove('open'); }
document.getElementById('fab-btn').addEventListener('click', openDrawer);
document.getElementById('drawer-close').addEventListener('click', closeDrawer);
document.getElementById('drawer-bg').addEventListener('click', e => {
  if (e.target===document.getElementById('drawer-bg')) closeDrawer();
});

// Add person modal
function openApModal() {
  const input = document.getElementById('ap-input');
  input.value = `Guest ${Store.cart.persons.length+1}`;
  document.getElementById('ap-bg').classList.add('open');
  setTimeout(()=>{ input.focus(); input.select(); }, 80);
}
function closeApModal() { document.getElementById('ap-bg').classList.remove('open'); }
document.getElementById('ap-cancel').addEventListener('click', closeApModal);
document.getElementById('ap-confirm').addEventListener('click', () => {
  const name = document.getElementById('ap-input').value.trim();
  if (!name) return;
  activePersonIdx = Store.addPerson(name);
  closeApModal(); buildPersonStrip(); buildMenuContent(); renderCart();
  showToast(`${name} added to order`, 'success', 2000);
});
document.getElementById('ap-input').addEventListener('keydown', e => {
  if (e.key==='Enter') document.getElementById('ap-confirm').click();
  if (e.key==='Escape') closeApModal();
});
</script>
</body>
</html>
